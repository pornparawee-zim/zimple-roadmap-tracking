<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zimple Omni — Roadmap Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--surface:#181c27;--card:#1e2334;--border:#2a3048;
  --accent:#5b8dee;--accent2:#7c5bde;--green:#3ecf8e;
  --yellow:#f5a623;--red:#f0566a;--orange:#fc8c40;--muted:#6b7595;
  --text:#e4e8f5;--textdim:#9aa3c2;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans Thai',sans-serif;
  --ms-bg:rgba(30,35,52,.9);--story-bg:rgba(12,14,22,.5);--story-bg-h:rgba(12,14,22,.8);
}
body.light{
  --bg:#f0f2f7;--surface:#ffffff;--card:#f7f8fc;--border:#dde1ee;
  --accent:#3b6fd4;--accent2:#6040b8;--green:#1e9e6b;
  --yellow:#c77c00;--red:#d63e54;--orange:#c26000;--muted:#8892b0;
  --text:#1a1f36;--textdim:#4a5568;
  --ms-bg:rgba(220,225,240,.9);--story-bg:rgba(240,242,250,.7);--story-bg-h:rgba(230,233,248,.9);
}
.product-bar{display:flex;gap:2px;background:var(--bg);border-radius:6px;padding:3px;border:1px solid var(--border)}
.prod{padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--textdim);transition:all .15s;white-space:nowrap}
.prod:hover{background:var(--card);color:var(--text)}
.prod.active{background:var(--card);color:var(--text);font-weight:500}
.theme-btn{
  font-size:15px;cursor:pointer;padding:3px 7px;border-radius:5px;
  border:1px solid var(--border);background:transparent;
  transition:all .15s;line-height:1;
}
.theme-btn:hover{background:var(--card)}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;height:100%;overflow:hidden}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:500;color:#fff;flex-shrink:0}
.ht{flex:1}.ht h1{font-size:13px;font-weight:600}.ht p{font-size:10px;color:var(--muted);margin-top:1px}
.ha{display:flex;gap:6px;align-items:center}
.btn{padding:5px 12px;border-radius:5px;font-size:11px;font-family:var(--sans);cursor:pointer;border:none;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--textdim)}
.tab-bar{display:flex;gap:2px;background:var(--card);border-radius:6px;padding:3px}
.tab{padding:4px 11px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--textdim);transition:all .15s}
.tab.active{background:var(--accent);color:#fff}

/* Layout */
.layout{display:flex;height:calc(100vh - 50px)}
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
.sb-sec{padding:5px 13px 3px;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:7px;padding:6px 13px;cursor:pointer;
  color:var(--textdim);font-size:11px;border-left:2px solid transparent;transition:all .12s}
.sb-item:hover{background:var(--card);color:var(--text)}
.sb-item.active{border-left-color:var(--accent);color:var(--accent);background:rgba(91,141,238,.08)}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Main */
.view{display:none}.view.active{display:block}
.main{flex:1;overflow-y:auto;padding:13px 16px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.kpi-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.kpi-val{font-family:var(--mono);font-size:18px;font-weight:500}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:2px}
.c-blue{color:var(--accent)}.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-red{color:var(--red)}

/* Banners */
.banner{border-radius:6px;padding:6px 11px;margin-bottom:7px;font-size:11px;display:none}
.banner.show{display:block}
.banner-red{background:rgba(240,86,106,.08);border:1px solid rgba(240,86,106,.3);color:var(--red)}
.banner-yellow{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.3);color:var(--yellow)}
.banner-blue{background:rgba(91,141,238,.08);border:1px solid rgba(91,141,238,.3);color:var(--accent)}

/* Filter bar */
.filter-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.search{background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--sans);font-size:11px;border-radius:20px;padding:4px 11px;outline:none;width:160px}
.search::placeholder{color:var(--muted)}
.ctrl-btn{font-size:10px;color:var(--textdim);cursor:pointer;padding:3px 9px;
  border:1px solid var(--border);border-radius:4px;background:transparent;font-family:var(--sans)}
.ctrl-btn:hover{color:var(--accent);border-color:var(--accent)}
.ctrl-btn.on{color:var(--accent);border-color:var(--accent);background:rgba(91,141,238,.08)}
.ls-info{font-size:10px;color:var(--muted);margin-left:auto}

/* ══════════════════════════════════════
   THREE-LEVEL TABLE
   Milestone row → Epic row → Story rows
   ══════════════════════════════════════ */
.tracker-table{width:100%;border-collapse:collapse;margin-bottom:16px}

/* Column headers */
.tracker-table thead th{
  text-align:left;font-size:9px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;padding:5px 7px;
  border-bottom:1px solid var(--border);background:var(--surface);
  position:sticky;top:0;z-index:10;white-space:nowrap
}

/* ── MILESTONE ROW ── */
.ms-row{cursor:default}
.ms-row td{
  padding:9px 8px 6px;
  background:var(--ms-bg);
  border-top:2px solid var(--border);
  border-bottom:1px solid var(--border);
}
.ms-row.ms-hidden{display:none}
.ms-label{display:flex;align-items:center;gap:8px}
.ms-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ms-name{font-size:12px;font-weight:600}
.ms-cu-id{font-family:var(--mono);font-size:10px}
.ms-note{font-size:11px;color:var(--textdim)}

/* ── EPIC ROW ── */
.epic-row td{
  padding:7px 8px;
  border-bottom:1px solid rgba(42,48,72,.5);
  border-top:1px solid rgba(42,48,72,.25);
  background:var(--card);
  vertical-align:middle;
}
.epic-row:hover td{background:rgba(36,42,62,.9)}
.epic-row.ep-blocked td{background:rgba(240,86,106,.06)}
.epic-row.ep-risk td{background:rgba(245,166,35,.04)}

.epic-row td:first-child{border-left:2px solid rgba(91,141,238,.4)}
.epic-row.ep-blocked td:first-child{border-left-color:var(--red)}
.epic-row.ep-risk td:first-child{border-left-color:var(--yellow)}
body.light .epic-row td{background:#f0f3fa}
body.light .epic-row:hover td{background:#e8ecf6}

.epic-label{display:flex;align-items:center;gap:6px}
.epic-indent{width:16px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end}
.epic-tree{color:var(--border);font-size:12px;line-height:1}
.epic-id{font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0}
.epic-name{font-size:12px;font-weight:500;line-height:1.3;color:var(--text)}
.epic-name:focus{outline:none;background:rgba(91,141,238,.08);border-radius:3px;padding:1px 3px}

/* story expand toggle */
.stoggle{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9px;font-family:var(--mono);
  color:var(--muted);cursor:pointer;
  padding:2px 5px;border:1px solid var(--border);border-radius:3px;
  background:transparent;white-space:nowrap;transition:all .12s;
  user-select:none; flex-shrink:0;
}
.stoggle:hover{color:var(--accent);border-color:var(--accent)}
.stoggle.open{color:var(--accent);border-color:rgba(91,141,238,.4);background:rgba(91,141,238,.06)}
.stoggle .blk{color:var(--red);margin-left:1px}
.stoggle .arr{font-size:8px;transition:transform .15s;display:inline-block}
.stoggle.open .arr{transform:rotate(90deg)}

/* ── STORY ROWS ── */
.story-row{display:none}
.story-row.story-open{display:table-row}
.story-row td{
  padding:3px 8px 3px 40px;
  border-bottom:1px solid rgba(42,48,72,.15);
  background:var(--story-bg);
  vertical-align:middle;
  font-size:11px;
}
.story-row:hover td{background:var(--story-bg-h)}
.story-row.sr-blocked td{background:rgba(240,86,106,.05)}
.story-row.sr-done td{opacity:.55}

.story-label{display:flex;align-items:center;gap:6px}
.story-tree{color:rgba(42,48,72,.8);font-size:10px;flex-shrink:0;font-family:var(--mono)}
.story-id{font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;white-space:nowrap;opacity:.8}
.story-name{font-size:10.5px;color:var(--muted);line-height:1.3}
.story-name a{color:inherit;text-decoration:none}
.story-name a:hover{color:var(--accent)}
.story-assignee{font-size:9px;font-family:var(--mono);color:var(--muted);white-space:nowrap;opacity:.7}

/* common cells */
.owner-chip{display:inline-block;font-size:9px;font-family:var(--mono);padding:1px 5px;
  border-radius:3px;background:rgba(124,91,222,.12);color:#a78bfa;white-space:nowrap}
.date-val{font-family:var(--mono);font-size:10px;color:var(--textdim);white-space:nowrap}
.date-val.od{color:var(--red)}

/* status badge */
.sb{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:20px;
  font-size:9px;font-weight:500;white-space:nowrap}
.sb::before{content:'';width:4px;height:4px;border-radius:50%}
.sb.clickable{cursor:pointer}
/* ── Status colors — consolidated into 5 scannable groups instead of 9 ──
   Not Started (gray) · In Progress (blue: in-progress + dev-testing) ·
   In Review (purple: reviewing + qa-testing + sit-ready) · Done (green) ·
   Blocked/Delayed (red: blocked + delayed). The status TEXT stays specific
   (e.g. "SIT Ready" still says "SIT Ready") — only the color groups by
   meaning, so you can tell "needs attention" from "on track" at a glance. */
.s-not-started{background:rgba(107,117,149,.12);color:var(--muted)}.s-not-started::before{background:var(--muted)}
.s-in-progress{background:rgba(91,141,238,.12);color:var(--accent)}.s-in-progress::before{background:var(--accent);animation:pulse 1.5s infinite}
.s-done{background:rgba(62,207,142,.12);color:var(--green)}.s-done::before{background:var(--green)}
.s-blocked{background:rgba(240,86,106,.12);color:var(--red)}.s-blocked::before{background:var(--red)}
.s-delayed{background:rgba(240,86,106,.12);color:var(--red)}.s-delayed::before{background:var(--red)}
.s-qa-testing{background:rgba(124,91,222,.12);color:var(--accent2)}.s-qa-testing::before{background:var(--accent2)}
.s-sit-ready{background:rgba(124,91,222,.12);color:var(--accent2)}.s-sit-ready::before{background:var(--accent2)}
.s-reviewing{background:rgba(124,91,222,.12);color:var(--accent2)}.s-reviewing::before{background:var(--accent2)}
.s-dev-testing{background:rgba(91,141,238,.12);color:var(--accent)}.s-dev-testing::before{background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* sprint chips */
.sp-chips{display:flex;flex-wrap:wrap;gap:2px}
.sp-chip{font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px;
  background:rgba(91,141,238,.1);color:var(--accent)}
.sp-chip.sp-cur{background:rgba(245,166,35,.2);color:var(--yellow);font-weight:600}
.sp-chip.sp-dn{background:rgba(62,207,142,.08);color:var(--green)}

/* progress bar */
.pb-w{width:60px}
.pb-lbl{font-size:9px;color:var(--muted);margin-bottom:2px;font-family:var(--mono)}
.pb{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pb-fill{height:100%;border-radius:2px;transition:width .3s}

/* CU link */
.cu-link{font-size:9px;font-family:var(--mono);color:var(--accent);text-decoration:none;
  background:rgba(91,141,238,.07);border-radius:3px;padding:1px 4px;white-space:nowrap}
.cu-link:hover{background:rgba(91,141,238,.18)}
.warn-badge{font-size:9px;background:rgba(245,166,35,.12);color:var(--yellow);
  border-radius:3px;padding:1px 4px;margin-left:2px;cursor:help}

/* note */
.note-cell{font-size:10px;color:var(--textdim);line-height:1.3;min-width:80px;max-width:150px}
.note-cell:focus{outline:1px solid var(--accent);border-radius:3px;padding:2px 3px;background:rgba(91,141,238,.06);color:var(--text)}
.note-cell.nb{color:var(--red)}

/* ── Detail Panel ── */
.dp{position:fixed;right:0;top:50px;bottom:0;width:330px;background:var(--surface);
  border-left:1px solid var(--border);padding:14px;overflow-y:auto;z-index:50;
  transform:translateX(100%);transition:transform .2s ease}
.dp.open{transform:translateX(0)}
.dp-close{float:right;cursor:pointer;color:var(--muted);font-size:15px}
.dp-wbs{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:2px}
.dp-title{font-size:12px;font-weight:600;margin-bottom:11px;line-height:1.3}
.dp-row{margin-bottom:10px}
.dp-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
select.isel,input.iin,textarea.ita{background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--sans);font-size:11px;border-radius:5px;padding:4px 7px;width:100%}
select.isel{cursor:pointer}
textarea.ita{resize:vertical;min-height:46px}
input[type=range]{width:100%;accent-color:var(--accent)}
.btag{display:inline-block;background:rgba(240,86,106,.12);color:var(--red);
  border-radius:3px;font-size:10px;padding:1px 5px;margin:2px;cursor:pointer}
.btag:hover{background:rgba(240,86,106,.25)}
.btn-sm{padding:3px 8px;font-size:10px;border-radius:4px}
.btn-danger{background:var(--red);color:#fff}
.cu-mirror{background:rgba(91,141,238,.05);border:1px solid rgba(91,141,238,.18);
  border-radius:5px;padding:7px 8px;margin-bottom:9px}
.cu-mirror .lbl{font-size:9px;color:var(--muted);margin-bottom:2px}
.cu-mirror .val{font-size:11px;display:flex;align-items:center;gap:5px}
.cu-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Risk view */
.risk-card{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:11px 13px;margin-bottom:7px;position:relative;overflow:hidden}
.risk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.risk-card.lv-critical::before{background:var(--red)}
.risk-card.lv-high::before{background:var(--orange)}
.risk-card.lv-medium::before{background:var(--yellow)}
.risk-card.lv-low::before{background:var(--green)}
.rc-badge{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;flex-shrink:0}
.rc-badge.critical{background:rgba(240,86,106,.15);color:var(--red)}
.rc-badge.high{background:rgba(252,140,64,.15);color:var(--orange)}
.rc-badge.medium{background:rgba(245,166,35,.15);color:var(--yellow)}
.rc-badge.low{background:rgba(62,207,142,.15);color:var(--green)}
.rc-title{font-size:11.5px;font-weight:600;line-height:1.3}
.rc-body{font-size:11px;color:var(--textdim);line-height:1.5;margin-top:5px}
.rc-body strong{color:var(--text)}
.rc-meta{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.rc-tag{font-size:9px;background:rgba(42,48,72,.9);color:var(--muted);border-radius:3px;padding:1px 5px}
.rc-wbs{font-size:9px;background:rgba(91,141,238,.1);color:var(--accent);border-radius:3px;padding:1px 5px;font-family:var(--mono)}

.local-task-badge{background:rgba(30,158,110,.15);color:#1e9e6e;border:1px solid rgba(30,158,110,.3);border-radius:3px;font-size:8px;padding:1px 4px;margin-left:4px;flex-shrink:0;font-family:var(--mono)}
.drag-src{opacity:.35}
/* Timeline redesign */
.tl-ms-header{display:flex;align-items:center;gap:6px;padding:0 8px;font-size:10px;font-weight:700;letter-spacing:.3px;border-bottom:2px solid;position:relative;cursor:pointer;user-select:none}
.tl-ms-header:hover{filter:brightness(1.05)}
.tl-ms-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-ms-label{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tl-ms-prog{font-size:9px;font-family:var(--mono);opacity:.7;flex-shrink:0}
.tl-ms-chevron{font-size:9px;opacity:.5;flex-shrink:0;transition:transform .2s}
.tl-ms-chevron.open{transform:rotate(90deg)}
/* ── Story Side Panel ── */
#tl-story-panel{position:fixed;top:0;right:-320px;width:310px;height:100vh;background:var(--surface,#fff);border-left:1px solid var(--border);box-shadow:-4px 0 20px rgba(0,0,0,.12);z-index:200;transition:right .25s ease;display:flex;flex-direction:column}
#tl-story-panel.open{right:0}
.tl-sp-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
.tl-sp-close{margin-left:auto;background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);flex-shrink:0;padding:0 4px}
.tl-sp-wbs{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:2px}
.tl-sp-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.4}
.tl-sp-body{padding:12px 16px;overflow-y:auto;flex:1}
.tl-sp-story{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(42,48,72,.12)}
.tl-sp-story:last-child{border-bottom:none}
.tl-sp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tl-sp-info{flex:1;min-width:0}
.tl-sp-code{font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:2px}
.tl-sp-name{font-size:11px;color:var(--text);line-height:1.4}
.tl-sp-assignee{font-size:9px;color:var(--muted);margin-top:2px}
.tl-sp-empty{font-size:11px;color:var(--muted);text-align:center;padding:20px 0;font-style:italic}
.drop-line-above{position:relative}
.drop-line-above::before{content:'';position:absolute;top:-1px;left:4px;right:0;height:2px;background:var(--accent,#3b6fd4);border-radius:2px;z-index:10;pointer-events:none}
.drop-line-below{position:relative}
.drop-line-below::after{content:'';position:absolute;bottom:-1px;left:4px;right:0;height:2px;background:var(--accent,#3b6fd4);border-radius:2px;z-index:10;pointer-events:none}
#tl-tip{position:fixed;pointer-events:none;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:11px;font-family:var(--sans);color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:0;visibility:hidden;transition:opacity .1s;max-width:260px;line-height:1.5}
#tl-tip.show{opacity:1;visibility:visible}
#toast{position:fixed;bottom:16px;right:16px;background:var(--green);color:#0f1117;
  padding:7px 13px;border-radius:7px;font-size:11px;font-weight:600;
  z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none}

/* Timeline edit modal */
.tl-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:9000;display:flex;align-items:center;justify-content:center}
.tl-modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;min-width:290px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.4);max-height:85vh;overflow-y:auto}
.tl-modal h3{font-size:12px;font-weight:600;margin-bottom:2px}
.tl-modal p{font-size:10px;color:var(--muted);margin-bottom:12px}
.tl-modal label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;margin-top:9px}
.tl-modal input{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:12px;border-radius:5px;padding:5px 7px;width:100%}
.tl-modal-btns{display:flex;gap:6px;margin-top:14px;justify-content:flex-end}

dialog{
  border:1px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text);
  padding:18px 20px;min-width:320px;max-width:440px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  font-family:var(--sans);font-size:13px;
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  margin:0;
}
dialog::backdrop{background:rgba(0,0,0,.55)}

dialog#add-task-dlg{border:none;border-radius:10px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.25);max-width:500px;width:90vw;background:var(--surface,#fff);color:var(--text,#1a1f36)}
dialog#add-task-dlg::backdrop{background:rgba(0,0,0,.45)}
dialog#add-task-dlg h3{font-size:13px;font-weight:600;margin:0 0 4px}
dialog#add-task-dlg p{font-size:10px;color:var(--muted,#888);margin:0 0 12px}
dialog#add-task-dlg label{display:block;font-size:9px;color:var(--muted,#888);text-transform:uppercase;letter-spacing:.6px;margin:10px 0 3px}
dialog#add-task-dlg input,dialog#add-task-dlg select,dialog#add-task-dlg textarea{background:var(--card,#f8fafc);border:1px solid var(--border,#dde3f0);color:var(--text,#1a1f36);font-family:var(--sans);font-size:12px;border-radius:5px;padding:6px 8px;width:100%;box-sizing:border-box}
dialog#add-task-dlg .row2{display:flex;gap:8px}
dialog#add-task-dlg .row2>div{flex:1}
dialog#add-task-dlg .btns{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}

dialog#tl-edit-dlg{border:none;border-radius:10px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.25);max-width:380px;width:90vw;background:var(--surface,#fff);color:var(--text,#1a1f36)}
dialog#tl-edit-dlg::backdrop{background:rgba(0,0,0,.45)}
dialog#tl-edit-dlg label{display:block;font-size:9px;color:var(--muted,#888);text-transform:uppercase;letter-spacing:.6px;margin:10px 0 3px;font-family:var(--sans)}
dialog#tl-edit-dlg input,dialog#tl-edit-dlg select,dialog#tl-edit-dlg textarea{background:var(--card,#f8fafc);border:1px solid var(--border,#dde3f0);color:var(--text,#1a1f36);font-family:var(--sans);font-size:12px;border-radius:5px;padding:6px 8px;width:100%;box-sizing:border-box}
dialog#tl-edit-dlg .btns{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}

<header>
  <div class="logo" id="header-logo">ZO</div>
  <div class="ht">
    <h1 id="header-title">Zimple Omni — Roadmap Tracker</h1>
    <p id="header-sub">Milestone → Epic → Story · ClickUp linked</p>
  </div>
  <div class="ha">
    <div class="product-bar" id="product-bar">
      <div class="prod active" onclick="switchProduct('omni',this)" title="Zimple Omni">🔵 Omni</div>
      <div class="prod" onclick="switchProduct('ai',this)" title="Zimple AI">🟣 AI</div>
      <div class="prod" onclick="switchProduct('ecom',this)" title="Zimple ECom">🟠 ECom</div>
    </div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchView('roadmap',this)">📋 Roadmap</div>
      <div class="tab" onclick="switchView('timeline',this)">📅 Timeline</div>
      <div class="tab" onclick="switchView('risk',this)">🔴 Risk</div>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="สลับ Light/Dark">🌙</button>
    <span id="save-status" style="font-size:10px;color:var(--muted)">ยังไม่บันทึก</span>
    <button id="btn-export-csv" class="btn btn-ghost" onclick="exportCSV()">📥 Export CSV</button>
    <button id="btn-save-edits" class="btn btn-primary" onclick="saveAll()">💾 บันทึกการแก้ไข</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <!-- rendered by renderSidebar() -->
  </nav>

  <main class="main">
    <!-- ROADMAP VIEW -->
    <div class="view active" id="view-roadmap">
      <div class="kpi-row" id="kpi-row"></div>
      <div class="banner banner-red" id="ban-blocked"></div>
      <div class="banner banner-yellow" id="ban-risk"></div>
      <div class="banner banner-blue" id="ban-info"></div>
      <div class="filter-row">
        <input class="search" type="text" placeholder="🔍 ค้นหา Epic, Story, owner..." oninput="doSearch(this.value)">
        <span class="ls-info" style="margin-left:auto;display:flex;align-items:center;gap:12px">
          <span style="color:var(--muted)">🔄 CU pulled: <span id="roadmap-pulled">—</span></span>
        </span>
      </div>
      <div id="table-wrap"></div>
    </div>

    <!-- RISK VIEW -->
    <div class="view" id="view-risk">
      <div id="risk-content"></div>
    </div>

    <!-- TIMELINE VIEW -->
    <div class="view" id="view-timeline">
      <div id="timeline-content"></div>
    </div>
  </main>
</div>

<!-- Detail Panel -->
<div class="dp" id="dp">
  <span class="dp-close" onclick="closeDP()">✕</span>
  <div class="dp-wbs" id="dp-wbs"></div>
  <div class="dp-title" id="dp-title"></div>
  <div id="dp-body"></div>
</div>
<div id="tl-tip"></div>
<div id="toast"></div>

// hardcoding a sprint name/date anywhere else (Roadmap KPI, Risk view, etc.),

  return Object.values(SPRINTS).find(s=>s.cur) || null;

let currentProduct = 'omni';
function getDATA(){ return PRODUCTS[currentProduct].data; }

/* ── switchProduct ── */
function switchProduct(pid, el){
  if(pid === currentProduct) return;
  currentProduct = pid;
  const p = PRODUCTS[pid];

  // update header
  document.getElementById('header-logo').textContent = p.logo;
  document.getElementById('header-title').textContent = p.label + ' — Roadmap Tracker';
  document.getElementById('header-sub').textContent = 'Milestone → Epic → Story · ClickUp linked';

  // update product bar active
  document.querySelectorAll('.prod').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');

  // update logo gradient color
  document.getElementById('header-logo').style.background = `linear-gradient(135deg,${p.color},${p.color}aa)`;

  // reload overrides for this product
  overrides = JSON.parse(localStorage.getItem('zo_ov_'+currentProduct)||'{}');

  // reload TL state for this product
  tlState = tlGetState();
  tlDirty = false;

  // reset filters
  fMS=null; fSt=null; fSP=null; searchQ='';

  // re-render sidebar + everything
  renderSidebar();
  renderKPI();
  renderTable();
  const rp = document.getElementById('roadmap-pulled');
  if(rp) rp.textContent = fmtPulled(p.cuPulled);

  // switch to roadmap tab
  switchView('roadmap', document.querySelector('.tab.active') || document.querySelectorAll('.tab')[0]);

  // if no data, show empty state banner
  const ea = document.getElementById('empty-product-banner');
  if(getDATA().length === 0){
    if(!ea){
      const b = document.createElement('div');
      b.id = 'empty-product-banner';
      b.className = 'banner banner-blue show';
      b.style.marginTop = '10px';
      b.innerHTML = `📦 <strong>${p.label}</strong> ยังไม่มีข้อมูล — กด 🔄 Sync หรือรอ Jarvis เพิ่ม milestones`;
      document.getElementById('table-wrap').before(b);
    }
  } else {
    if(ea) ea.remove();
  }
}

/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */
function isOD(ep){ const d=epVal(ep,'due');const s=epVal(ep,'status');return s!=='done'&&d&&new Date(d)<new Date(); }
function ddiff(d){ return Math.round((new Date()-new Date(d))/86400000) }
function fmtD(d){ if(!d)return'—';return new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'}) }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function pcol(p,s){ if(s==='blocked')return'var(--red)';if(s==='done')return'var(--green)';if(p>=80)return'var(--green)';if(p>=40)return'var(--accent)';return'var(--accent2)' }
function spChips(sps){ return (sps||[]).map(k=>{if(k==='TBD')return`<span class="sp-chip" style="color:var(--muted)">TBD</span>`;const s=SPRINTS[k];if(!s)return'';return`<span class="sp-chip ${s.cur?'sp-cur':s.done?'sp-dn':''}">${s.n}</span>`;}).join('') }
function sbHtml(st,clickable,wbs){ return`<span class="sb s-${st}${clickable?' clickable':''}"${clickable?` onclick="openDP('${wbs}')"`:''}>${SL[st]||st}</span>` }
function cuLink(id,url){ return id?`<a class="cu-link" href="${url}" target="_blank">${id} ↗</a>`:`<span style="font-size:9px;color:var(--muted)">—</span>` }

/* ═══════════════════════════════════════════
   KPI
   ═══════════════════════════════════════════ */
function renderKPI(){
  const _cur = getCurrentSprint();
  let tot=0,dn=0,bl=0,ip=0,stTot=0;
  getDATA().forEach(ms=>ms.epics.forEach(ep=>{
    tot++;
    const st=epVal(ep,'status');
    if(st==='done')dn++;
    if(st==='blocked')bl++;
    if(['in-progress','sit-ready','qa-testing','dev-testing','reviewing'].includes(st))ip++;
    stTot+=ep.stories.length;
  }));
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">Overall</div><div class="kpi-val c-blue">${Math.round(dn/tot*100)}%</div><div class="kpi-sub">${dn}/${tot} epics</div></div>
    <div class="kpi"><div class="kpi-lbl">Active</div><div class="kpi-val c-blue">${ip}</div><div class="kpi-sub">in progress/QA</div></div>
    <div class="kpi"><div class="kpi-lbl">Blocked</div><div class="kpi-val c-red">${bl}</div><div class="kpi-sub">epics ติดขัด</div></div>
    <div class="kpi"><div class="kpi-lbl">Stories</div><div class="kpi-val" style="color:var(--accent2)">${stTot}</div><div class="kpi-sub">จาก ClickUp</div></div>
    <div class="kpi"><div class="kpi-lbl">Sprint</div><div class="kpi-val" style="color:var(--yellow);font-size:13px">${_cur?_cur.n+' 🔥':'—'}</div><div class="kpi-sub">${_cur?_cur.d:'ไม่มี sprint ที่ active'}</div></div>
  `;
  // banners
  const bb=document.getElementById('ban-blocked');
  bb.innerHTML=bl?`🔴 <strong>${bl} Epic Blocked</strong> — ${getDATA().flatMap(ms=>ms.epics).filter(ep=>epVal(ep,'status')==='blocked').map(ep=>ep.wbs).join(', ')}`:'';
  bb.className='banner banner-red'+(bl?' show':'');

  // risk banner — show only if has blocked or no-date epics
  const noDate = getDATA().flatMap(ms=>ms.epics).filter(ep=>!ep.due&&!ep.start).length;
  const rb = document.getElementById('ban-risk');
  const rbMsg = [];
  if(bl) rbMsg.push(`${bl} Epic ยัง Blocked`);
  if(noDate) rbMsg.push(`${noDate} Epic ยังไม่มี date`);
  rb.innerHTML = rbMsg.length ? `⚠️ ${rbMsg.join(' · ')}` : '';
  rb.className = 'banner banner-yellow' + (rbMsg.length?' show':'');

  // info banner
  const sitCount = getDATA().flatMap(ms=>ms.epics).filter(ep=>epVal(ep,'status')==='sit-ready').length;
  const ib = document.getElementById('ban-info');
  ib.innerHTML = sitCount ? `ℹ️ <strong>${sitCount} Epic</strong> อยู่ใน SIT Ready — รอ QA sign-off` : '';
  ib.className = 'banner banner-blue' + (sitCount?' show':'');
}

/* ═══════════════════════════════════════════
   RENDER TABLE  (3 levels)
   ═══════════════════════════════════════════ */
function renderTable(){
  const wrap=document.getElementById('table-wrap');
  wrap.innerHTML=`
  <table class="tracker-table">
    <thead><tr>
      <th style="min-width:58px">WBS</th>
      <th>Epic / Task</th>
      <th style="width:90px">Owner</th>
      <th style="width:76px">Due</th>
      <th style="width:86px">Status</th>
      <th style="width:60px">%</th>
      <th style="width:118px">Sprint</th>
      <th style="width:78px">CU link</th>
      <th>Note / Blocker</th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>`;
  const tb=document.getElementById('tb');

  getDATA().forEach(ms=>{
    // milestone filter
    if(fMS && fMS!==ms.msId) return;

    // check if any epic passes filters
    let visibleEpics = ms.epics.filter(ep=>epicVisible(ep));
    if(!visibleEpics.length && (fSt||fSP||searchQ)) return;

    // ── Milestone row ──
    const msTr=document.createElement('tr');
    msTr.className='ms-row';
    const isMisc = ms.msId === 'MS-MISC' || ms.msId === 'MS-A4' || ms.msId === 'MS-A5';
    const msStBadge=sbHtml(ms.msStatus,false,'');
    const msCuCell=ms.cuId?`<a class="cu-link" href="${ms.cuUrl}" target="_blank">${ms.cuId}</a>
      <span class="sb s-${cuStKey(ms.cuStatus)}" style="pointer-events:none;margin-left:3px">${ms.cuStatus}</span>`:'—';
    const msSpChips=spChips(ms.sprints);
    msTr.innerHTML=`
      <td colspan="9" style="${isMisc?'border-top:2px dashed var(--border);border-bottom:1px dashed rgba(107,117,149,.3)':''}">
        <div class="ms-label">
          <div class="ms-dot" style="background:${ms.msColor}"></div>
          <span class="ms-name">${isMisc?'📌 ':''} ${ms.msName}</span>
          ${msStBadge}
          <span style="font-size:9px;color:var(--muted);margin-left:2px">${msCuCell}</span>
          <div class="sp-chips" style="margin-left:4px">${msSpChips}</div>
        </div>
      </td>`;
    tb.appendChild(msTr);

    // ── Epic rows ──
    ms.epics.forEach(ep=>{
      const visible=epicVisible(ep);
      // skip entirely when filtering by sprint/status and epic doesn't match
      if(!visible && (fSP||fSt)) return;
      const st=epVal(ep,'status');
      const pct=epVal(ep,'pct');
      const due=epVal(ep,'due');
      const owner=epVal(ep,'owner');
      const note=epVal(ep,'note');
      const od=isOD(ep);
      const hasStories=ep.stories.length>0;
      const isOpen=!!storyOpen[ep.wbs];
      const blockedCnt=ep.stories.filter(s=>s.status==='blocked').length;

      let epCls='epic-row';
      if(st==='blocked')epCls+=' ep-blocked';
      else if(ep.conf==='low')epCls+=' ep-risk';
      if(!visible)epCls+=' ep-hidden';

      const epTr=document.createElement('tr');
      epTr.className=epCls;
      epTr.id=`ep-${epKey(ep.wbs)}`;

      // story toggle — inline in name cell
      const toggleEl = hasStories
        ? `<span class="stoggle${isOpen?' open':''}" id="stg-${epKey(ep.wbs)}" onclick="toggleStories('${ep.wbs}',event)" title="펼치기/접기 stories">
            <span class="arr">▶</span>
            ${blockedCnt?`<span class="blk">🔴${blockedCnt}</span>`:''}
           </span>`
        : `<span style="font-size:9px;color:var(--border)">│</span>`;

      // CU cell
      const cuCell=ep.cuId
        ?`${cuLink(ep.cuId,ep.cuUrl)}${ep.conf==='low'?`<span class="warn-badge" title="${esc(ep.confNote||'')}">⚠️</span>`:''}`
        :`<span style="font-size:9px;color:var(--muted)">—</span>${ep.confNote?`<span class="warn-badge" title="${esc(ep.confNote||'')}">?</span>`:''}`;

      epTr.innerHTML=`
        <td><span style="font-family:var(--mono);font-size:10px;color:var(--muted)">${ep.wbs}</span></td>
        <td>
          <div class="epic-label">
            ${toggleEl}
            <span class="epic-id">${ep.cuId||''}</span>
            <div class="epic-name" contenteditable="true" onblur="setOv('${ep.wbs}','name',this.innerText);renderKPI()">${esc(ep.name)}</div>
          </div>
        </td>
        <td><span class="owner-chip">${esc(owner.split('/')[0].trim())}</span></td>
        <td><span class="date-val ${od?'od':''}">${fmtD(due)}${od?`(+${ddiff(due)}d)`:''}</span></td>
        <td>${sbHtml(st,true,ep.wbs)}</td>
        <td><div class="pb-w"><div class="pb-lbl">${pct}%</div>
          <div class="pb"><div class="pb-fill" style="width:${pct}%;background:${pcol(pct,st)}"></div></div></div></td>
        <td><div class="sp-chips">${spChips(ep.sprints)}</div></td>
        <td>${cuCell}</td>
        <td><div class="note-cell ${ep.blocking.length?'nb':''}" contenteditable="true"
          onblur="setOv('${ep.wbs}','note',this.innerText)">${ep.blocking.length?'🔴 ':''}${esc(note||'—')}</div></td>
      `;
      tb.appendChild(epTr);

      // ── Story rows ──
      ep.stories.forEach((s,i)=>{
        // if sprint filter active: stories belong to same sprint as parent epic
        if(fSP && !(ep.sprints||[]).includes(fSP)) return;
        const sTr=document.createElement('tr');
        const isLast=i===ep.stories.length-1;
        sTr.className=`story-row${isOpen?' story-open':''}${s.status==='blocked'?' sr-blocked':s.status==='done'?' sr-done':''}`;
        sTr.id=`sr-${epKey(ep.wbs)}-${i}`;
        // search highlight
        if(searchQ && !s.name.toLowerCase().includes(searchQ)&&!s.id.toLowerCase().includes(searchQ)&&!s.assignee.toLowerCase().includes(searchQ)){
          sTr.style.display='none';
        }
        sTr.innerHTML=`
          <td colspan="2">
            <div class="story-label">
              <span class="story-tree">${isLast?'└':'├'}─</span>
              <span class="story-id">${s.id}</span>
              <div class="story-name">
                <a href="${s.url}" target="_blank" title="${esc(s.name)}">${esc(s.name)}</a>
              </div>
            </div>
          </td>
          <td><span class="story-assignee">${esc(s.assignee)}</span></td>
          <td>—</td>
          <td>${sbHtml(s.status,false,'')}</td>
          <td colspan="4" style="font-size:9px;color:var(--muted)">
            <a class="cu-link" href="${s.url}" target="_blank">${s.id} ↗</a>
            &nbsp;·&nbsp;${s.code}
          </td>
        `;
        tb.appendChild(sTr);
      });
    });
  });
}

function epKey(wbs){ return wbs.replace(/[^a-z0-9]/gi,'_') }

function epicVisible(ep){
  const st=epVal(ep,'status');
  const note=epVal(ep,'note');
  if(fSt && st!==fSt) return false;
  if(fSP && !(ep.sprints||[]).includes(fSP)) return false;
  if(searchQ){
    const q=searchQ;
    const inEpic=ep.wbs.toLowerCase().includes(q)||ep.name.toLowerCase().includes(q)||(ep.cuId||'').toLowerCase().includes(q)||(epVal(ep,'owner')||'').toLowerCase().includes(q)||(note||'').toLowerCase().includes(q);
    const inStory=ep.stories.some(s=>s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q)||s.assignee.toLowerCase().includes(q));
    return inEpic||inStory;
  }
  return true;
}

function cuStKey(s){
  if(!s)return'not-started';
  const m={'to do':'not-started','in progress':'in-progress','done':'done','blocked':'blocked',
    'qa testing':'qa-testing','reviewing':'reviewing','dev testing':'dev-testing',
    '[sit] ready to qa test':'sit-ready','[prod] ready to release':'done'};
  return m[s.toLowerCase()]||'in-progress';
}

/* ═══════════════════════════════════════════
   STORY TOGGLE — only modifies display of story rows
   ═══════════════════════════════════════════ */
function toggleStories(wbs,e){
  e.stopPropagation();
  storyOpen[wbs]=!storyOpen[wbs];
  const key=epKey(wbs);
  document.querySelectorAll(`[id^="sr-${key}-"]`).forEach(el=>{
    if(el.style.display==='none' && searchQ) return;
    el.classList.toggle('story-open',storyOpen[wbs]);
  });
  const btn=document.getElementById('stg-'+key);
  if(btn){
    btn.classList.toggle('open',storyOpen[wbs]);
  }
}

function toggleAllStories(){
  allOpen=!allOpen;
  getDATA().forEach(ms=>ms.epics.forEach(ep=>{
    if(ep.stories.length){
      storyOpen[ep.wbs]=allOpen;
      const key=epKey(ep.wbs);
      document.querySelectorAll(`[id^="sr-${key}-"]`).forEach(el=>el.classList.toggle('story-open',allOpen));
      const btn=document.getElementById('stg-'+key);
      if(btn) btn.classList.toggle('open',allOpen);
    }
  }));
  const b=document.getElementById('btn-expand-all');
  b.textContent=allOpen?'접기 Stories ทั้งหมด':'펼치기 Stories ทั้งหมด';
  b.classList.toggle('on',allOpen);
}

/* ═══════════════════════════════════════════
   SIDEBAR — dynamic per product
   ═══════════════════════════════════════════ */
function renderSidebar(){
  const data = getDATA();
  const sprintSet = new Set();
  data.forEach(ms=>ms.epics.forEach(ep=>(ep.sprints||[]).forEach(s=>sprintSet.add(s))));
  const sprints=[...sprintSet].filter(s=>s!=='TBD').sort();

  let html = `<div class="sb-sec">Milestone</div>
    <div class="sb-item active" onclick="filterMS(null,this)"><div class="sb-dot" style="background:var(--accent)"></div>ทั้งหมด</div>`;

  data.forEach(ms=>{
    const shortName = ms.msName.replace(/^MS-\w+\s·\s/,'').replace(/^📌\s*/,'');
    const epics = ms.epics||[];
    const done = epics.filter(e=>e.status==='done').length;
    const total = epics.length;
    const pct = total>0?Math.round(done/total*100):0;
    const barColor = pct===100?'#3ecf8e':ms.msColor;
    html+=`<div class="sb-item" onclick="filterMS('${ms.msId}',this)" style="flex-direction:column;align-items:flex-start;gap:3px;padding:5px 8px">
      <div style="display:flex;align-items:center;gap:5px;width:100%">
        <div class="sb-dot" style="background:${ms.msColor};flex-shrink:0"></div>
        <span>${ms.msId.replace('MS-','')} · ${shortName}</span>
      </div>
      ${total>0?`<div style="display:flex;align-items:center;gap:5px;width:100%;padding-left:14px">
        <div style="flex:1;height:3px;background:rgba(42,48,72,.2);border-radius:2px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${barColor};border-radius:2px;transition:width .4s"></div>
        </div>
        <span style="font-size:8px;color:var(--muted);font-family:var(--mono);flex-shrink:0">${done}/${total}</span>
      </div>`:''}
    </div>`;
  });

  html+=`<div class="sb-sec" style="margin-top:8px">สถานะ Epic</div>
    <div class="sb-item" onclick="filterSt('blocked',this)"><div class="sb-dot" style="background:var(--red)"></div>Blocked</div>
    <div class="sb-item" onclick="filterSt('in-progress',this)"><div class="sb-dot" style="background:var(--accent)"></div>In Progress</div>
    <div class="sb-item" onclick="filterSt('sit-ready',this)"><div class="sb-dot" style="background:var(--accent2)"></div>SIT Ready</div>
    <div class="sb-item" onclick="filterSt('qa-testing',this)"><div class="sb-dot" style="background:var(--accent2)"></div>QA Testing</div>
    <div class="sb-item" onclick="filterSt('done',this)"><div class="sb-dot" style="background:var(--green)"></div>Done</div>
    <div class="sb-item" onclick="filterSt('not-started',this)"><div class="sb-dot" style="background:var(--muted)"></div>Not planned</div>`;

  if(sprints.length){
    html+=`<div class="sb-sec" style="margin-top:8px">Sprint</div>`;
    sprints.slice(-3).reverse().forEach(s=>{
      const isCur=SPRINTS[s]&&SPRINTS[s].cur;
      html+=`<div class="sb-item" onclick="filterSP('${s}',this)">
        <div class="sb-dot" style="background:${isCur?'var(--yellow)':'var(--accent)'}"></div>${s}${isCur?' 🔥 Current':''}
      </div>`;
    });
  }

  document.getElementById('sidebar').innerHTML = html;
}


function sbActive(el){
  document.querySelectorAll('#sidebar .sb-item').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
}
function _renderActive(){ 
  const tlActive = document.getElementById('view-timeline')?.classList.contains('active');
  if(tlActive) renderTimeline(); else renderTable(); 
}
function filterMS(v,el){ fMS=v;fSt=null;fSP=null;sbActive(el);_renderActive(); }
function filterSt(v,el){ fSt=(fSt===v)?null:v;fMS=null;fSP=null;sbActive(el);if(!fSt)document.querySelector('#sidebar .sb-item')?.classList.add('active');_renderActive(); }
function filterSP(v,el){ fSP=(fSP===v)?null:v;fMS=null;fSt=null;sbActive(el);if(!fSP)document.querySelector('#sidebar .sb-item')?.classList.add('active');_renderActive(); }
function doSearch(v){ searchQ=v.toLowerCase(); renderTable(); }

/* ═══════════════════════════════════════════
   DETAIL PANEL
   ═══════════════════════════════════════════ */
function findEpic(wbs){
  for(const ms of getDATA()) for(const ep of ms.epics) if(ep.wbs===wbs) return {ms,ep};
  return null;
}
function openDP(wbs){
  const found=findEpic(wbs);if(!found)return;
  const {ms,ep}=found;
  const st=epVal(ep,'status'),pct=epVal(ep,'pct'),owner=epVal(ep,'owner'),note=epVal(ep,'note'),due=epVal(ep,'due');
  document.getElementById('dp-wbs').textContent=ep.wbs;
  document.getElementById('dp-title').textContent=ep.name;
  const spH=(ep.sprints||[]).map(k=>{const s=SPRINTS[k];if(!s)return k;return(s.cur?'🔥 ':s.done?'✅ ':'')+s.n+' ('+s.d+')'}).join('<br>');
  document.getElementById('dp-body').innerHTML=`
    ${ep.cuId?`<div class="cu-mirror"><div class="lbl">📌 ClickUp (read-only)</div>
      <div class="val"><span class="cu-dot" style="background:${ep.cuId?'#5f55ee':'#aaa'}"></span>
        ${ep.cuId} · ${ep.cuStatus||'—'}
        <a class="cu-link" href="${ep.cuUrl}" target="_blank" style="margin-left:3px">↗</a></div>
      <div style="font-size:9px;color:var(--textdim);margin-top:4px">${spH}</div>
      ${ep.conf==='low'?`<div style="font-size:10px;color:var(--yellow);margin-top:3px">⚠️ ${esc(ep.confNote||'')}</div>`:''}
    </div>`:`<div style="font-size:10px;color:var(--muted);margin-bottom:8px;padding:5px 8px;background:rgba(107,117,149,.08);border-radius:4px">— ไม่พบใน CU${ep.confNote?`<br><span style="color:var(--yellow)">⚠️ ${esc(ep.confNote)}</span>`:''}</div>`}
    <div class="dp-row"><div class="dp-lbl">Milestone</div>
      <div style="font-size:11px;color:var(--textdim)">${ms.msName}</div></div>
    <div class="dp-row"><div class="dp-lbl">สถานะ (PM ปรับ)</div>
      <select class="isel" onchange="setOv('${wbs}','status',this.value);renderKPI();renderTable()">
        ${Object.entries(SL).map(([v,l])=>`<option value="${v}"${st===v?' selected':''}>${l}</option>`).join('')}
      </select></div>
    <div class="dp-row"><div class="dp-lbl" id="dp-pl">Progress (${pct}%)</div>
      <input type="range" min="0" max="100" step="5" value="${pct}"
        oninput="document.getElementById('dp-pl').textContent='Progress ('+this.value+'%)';setOv('${wbs}','pct',+this.value);renderKPI();renderTable()"></div>
    <div class="dp-row"><div class="dp-lbl">Owner</div>
      <input class="iin" value="${esc(owner)}" onblur="setOv('${wbs}','owner',this.value)"></div>
    <div class="dp-row"><div class="dp-lbl">Due Date</div>
      <input class="iin" type="date" value="${due||''}" onchange="setOv('${wbs}','due',this.value);renderTable()"></div>
    <div class="dp-row"><div class="dp-lbl">Note / Blocker</div>
      <textarea class="ita" onblur="setOv('${wbs}','note',this.value)">${esc(note)}</textarea></div>
    ${ep.stories.length?`
    <div class="dp-row" style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
      <div class="dp-lbl">Stories (${ep.stories.length})</div>
      ${ep.stories.map(s=>`<div style="display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid rgba(42,48,72,.3)">
        <span class="sb s-${s.status}" style="pointer-events:none;margin-top:1px;flex-shrink:0">${SL[s.status]||s.status}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:9px;color:var(--muted);font-family:var(--mono)">${s.id} · ${s.code}</div>
          <div style="font-size:10px;margin-top:1px"><a class="cu-link" href="${s.url}" target="_blank">${esc(s.name)}</a></div>
          <div style="font-size:9px;color:var(--muted);margin-top:1px">👤 ${esc(s.assignee)}</div>
        </div>
      </div>`).join('')}
    </div>`:''}
  `;
  document.getElementById('dp').classList.add('open');
}
function closeDP(){ document.getElementById('dp').classList.remove('open'); }

const ADMIN_PASSCODE_HASH = 'f75778f7425be4db0369d09af37a6c2b9a83dea0e53e7bd57412e4b060e607f7'; // sha256("supersecret")

// Pure-JS SHA-256 — deliberately NOT using window.crypto.subtle, because this
// file is opened via file:// (double-clicked / dragged into the browser),
// and crypto.subtle only works in "secure contexts" (https/localhost) —
// browsers disable it entirely on file:// pages, which would silently break
// the unlock button for everyone. This runs everywhere.
async function sha256Hex(str){
  function rotr(x,n){ return (x>>>n)|(x<<(32-n)); }
  const K = [
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ];
  let H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];

  const bytes = new TextEncoder().encode(str);
  const bitLen = bytes.length * 8;
  const withOne = new Uint8Array(((bytes.length + 9 + 63) >> 6) << 6);
  withOne.set(bytes);
  withOne[bytes.length] = 0x80;
  const view = new DataView(withOne.buffer);
  view.setUint32(withOne.length - 4, bitLen >>> 0);
  view.setUint32(withOne.length - 8, Math.floor(bitLen / 4294967296));

  for(let offset=0; offset<withOne.length; offset+=64){
    const w = new Array(64);
    for(let i=0;i<16;i++) w[i] = view.getUint32(offset + i*4);
    for(let i=16;i<64;i++){
      const s0 = rotr(w[i-15],7) ^ rotr(w[i-15],18) ^ (w[i-15]>>>3);
      const s1 = rotr(w[i-2],17) ^ rotr(w[i-2],19) ^ (w[i-2]>>>10);
      w[i] = (w[i-16] + s0 + w[i-7] + s1) | 0;
    }
    let [a,b,c,d,e,f,g,h] = H;
    for(let i=0;i<64;i++){
      const S1 = rotr(e,6) ^ rotr(e,11) ^ rotr(e,25);
      const ch = (e & f) ^ (~e & g);
      const temp1 = (h + S1 + ch + K[i] + w[i]) | 0;
      const S0 = rotr(a,2) ^ rotr(a,13) ^ rotr(a,22);
      const maj = (a & b) ^ (a & c) ^ (b & c);
      const temp2 = (S0 + maj) | 0;
      h=g; g=f; f=e; e=(d+temp1)|0; d=c; c=b; b=a; a=(temp1+temp2)|0;
    }
    H = [H[0]+a,H[1]+b,H[2]+c,H[3]+d,H[4]+e,H[5]+f,H[6]+g,H[7]+h].map(x=>x|0);
  }
  return H.map(x => (x>>>0).toString(16).padStart(8,'0')).join('');
}

// Headers for API calls — always the shared public anon key (read+write).
// Note: since we're not using Supabase Auth/RLS here, this key can still
// write directly if someone calls the API themselves — the passcode above
// only gates the button in THIS UI, it's not a database-level restriction.
function supaHeaders(){
  return {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};
}

// Load: try Supabase first, fallback to localStorage
async function tlLoadRemote(){
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/sprint_report?id=eq.${SUPA_RECORD()}&select=data`,{
      headers: supaHeaders()
    });
    if(!r.ok) return null;
    const rows = await r.json();
    if(rows.length && rows[0].data) return rows[0].data;
  } catch(e){}
  return null;
}

// Save: Supabase (upsert) + localStorage mirror.
// Returns {ok:true} on success, or {ok:false, reason:'locked'|'network'|'error'}
// so the UI can tell the difference between "not unlocked" and a real error.
async function tlSaveRemote(state){
  // Always save to localStorage as backup, regardless of cloud outcome
  localStorage.setItem(TL_STORE_KEY(), JSON.stringify(state));

  // The passcode gate lives here, client-side — see the comment on
  // ADMIN_PASSCODE_HASH above for what this does and doesn't protect against.
  if(!isPmLoggedIn()) return {ok:false, reason:'locked'};

  const headers = {...supaHeaders(), 'Content-Type':'application/json', 'Prefer':'resolution=merge-duplicates,return=minimal'};
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/sprint_report`,{
      method:'POST',
      headers,
      body:JSON.stringify({id:SUPA_RECORD(), data:state})
    });
    if(!r.ok) return {ok:false, reason:'error'};
    return {ok:true};
  } catch(e){
    return {ok:false, reason:'network'};
  }
}

function tlLoad(){
  try { return JSON.parse(localStorage.getItem(TL_STORE_KEY())||'null'); } catch{ return null; }
}
function tlSave(state){
  localStorage.setItem(TL_STORE_KEY(), JSON.stringify(state));
  // fire-and-forget remote save
  return tlSaveRemote(state).catch(()=>({ok:false, reason:'network'}));
}

// Build flat list from DATA (called once on sync or first load)
function tlBuildFromData(){
  const rows = [];
  getDATA().forEach(ms=>{
    ms.epics.forEach(ep=>{
      rows.push({
        wbs: ep.wbs,
        msId: ms.msId,
        msColor: ms.msColor,
        name: ep.name,
        start: ep.start||'',
        due: ep.due||'',
        status: ep.status,
        pct: ep.pct,
        owner: ep.owner,
        sprints: ep.sprints||[],
        stories: (ep.stories||[]).map(s=>({
          id: s.id, code: s.code||'', name: s.name,
          status: s.status, assignee: s.assignee||'',
          url: s.url||''
        })),
        note: '',
      });
    });
  });
  return { rows, msOrder: [], history: [], savedAt: new Date().toISOString() };
}

// Merge saved state with latest DATA:
// - Keep user-edited dates/status/pct/note/order from localStorage
// - Add new epics from CU (appended at end)
// - Remove epics deleted from CU
// - Always refresh name/msColor from DATA
// tlGetState is async when loading remote, but renderTimeline handles it
let _tlRemoteLoaded = false;

async function tlInitState(){
  if(!_tlRemoteLoaded){
    const remote = await tlLoadRemote();
    if(remote){
      // merge remote into tlState
      const merged = mergeState(remote);
      tlState = merged;
      _tlRemoteLoaded = true;
      renderTimeline();
      showToast('☁️ โหลดข้อมูลล่าสุดจาก Cloud แล้ว');
      return;
    }
    _tlRemoteLoaded = true;
  }
}

function tlGetState(){
  let saved = tlLoad();
  if(!saved){
    saved = tlBuildFromData();
    tlSave(saved);
    return saved;
  }

  return mergeState(saved);
}

// Reusable merge function — used by both tlGetState and tlInitState
function mergeState(saved){
  // Fresh rows from DATA (source of truth for structure)
  const freshRows = [];
  getDATA().forEach(ms=>{
    ms.epics.forEach(ep=>{
      freshRows.push({
        wbs: ep.wbs, msId: ms.msId, msColor: ms.msColor,
        name: ep.name, start: ep.start||'', due: ep.due||'',
        status: ep.status, pct: ep.pct, owner: ep.owner,
        sprints: ep.sprints||[],
        stories: (ep.stories||[]).map(s=>({
          id: s.id, code: s.code||'', name: s.name,
          status: s.status, assignee: s.assignee||'',
          url: s.url||''
        })),
        note: '',
      });
    });
  });

  const savedMap = {};
  (saved.rows||[]).forEach(r=>{ savedMap[r.wbs]=r; });

  const mergedRows = freshRows.map(fresh=>{
    const sv = savedMap[fresh.wbs];
    if(!sv) return fresh;
    return {
      ...fresh,
      start:  sv.start  || fresh.start,
      due:    sv.due    || fresh.due,
      status: sv.status || fresh.status,
      pct:    sv.pct !== undefined ? sv.pct : fresh.pct,
      note:   sv.note || '',
      _local: sv._local || false,
      cuId:   sv.cuId   || null,
    };
  });

  // Preserve saved row order; append new rows at end
  const remaining = new Set(mergedRows.map(r=>r.wbs));
  const orderedRows = [];
  (saved.rows||[]).forEach(sv=>{
    if(remaining.has(sv.wbs)){
      orderedRows.push(mergedRows.find(r=>r.wbs===sv.wbs));
      remaining.delete(sv.wbs);
    }
  });
  mergedRows.forEach(r=>{ if(remaining.has(r.wbs)) orderedRows.push(r); });

  return { rows: orderedRows, msOrder: saved.msOrder||[], history: saved.history||[], savedAt: saved.savedAt };
}

/* ─────────────────────────────────────────
   RENDER TIMELINE
   ───────────────────────────────────────── */
function renderTimeline(){
  // Dynamic date range — min(start) to max(due) from DATA (not tlState which may have empty dates)
  let minD = null, maxD = null;
  getDATA().forEach(ms=>ms.epics.forEach(ep=>{
    const s = ep.start; const d = ep.due;
    if(s){ const dt=new Date(s); if(!minD||dt<minD) minD=dt; }
    if(d){ const dt=new Date(d); if(!maxD||dt>maxD) maxD=dt; }
  }));
  // Also check tlState overrides
  tlState.rows.forEach(r=>{
    if(r.start){ const d=new Date(r.start); if(!minD||d<minD) minD=d; }
    if(r.due){   const d=new Date(r.due);   if(!maxD||d>maxD) maxD=d; }
  });
  // fallback: use today ± 6 months
  const today = new Date();
  if(!minD) minD = new Date(today.getFullYear(), today.getMonth()-1, 1);
  if(!maxD) maxD = new Date(today.getFullYear(), today.getMonth()+6, 1);
  // round to start of month, add 1 month padding each side
  const REF = new Date(minD.getFullYear(), minD.getMonth()-1, 1);
  const END = new Date(maxD.getFullYear(), maxD.getMonth()+2, 1);
  const TOTAL = Math.round((END - REF) / 86400000);

  function pct(dateStr){
    if(!dateStr) return null;
    const d = (new Date(dateStr) - REF) / 86400000;
    return Math.max(0, Math.min(100, d / TOTAL * 100));
  }
  function pctSpan(s,e){
    const ps=pct(s), pe=pct(e);
    if(ps===null && pe===null) return null;
    if(ps!==null && pe!==null) return {left:ps, width:Math.max(.5, pe-ps), dueOnly:false};
    // due-only: pin at due date
    if(pe!==null) return {left:Math.max(0,pe-0.8), width:1.6, dueOnly:true};
    // start-only: pin at start date
    if(ps!==null) return {left:ps, width:1.6, dueOnly:true};
    return null;
  }

  // Consolidated into the same 5 color groups as the status badges (see the
  // .s-* CSS rules): Not Started / In Progress / In Review / Done / Blocked.
  const BAR_COLOR = {
    done:'#3ecf8e',blocked:'#f0566a','qa-testing':'#7c5bde',
    'sit-ready':'#7c5bde','in-progress':'#5b8dee',reviewing:'#7c5bde',
    'dev-testing':'#5b8dee','not-started':'#2a3048',delayed:'#f0566a',
  };
  // Generate month marks dynamically between REF and END
  const MONTH_MARKS=[];
  const MONTH_LABELS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let mCursor = new Date(REF.getFullYear(), REF.getMonth(), 1);
  while(mCursor <= END){
    MONTH_MARKS.push({label:MONTH_LABELS[mCursor.getMonth()]+" '"+String(mCursor.getFullYear()).slice(2), d:mCursor.toISOString().slice(0,10)});
    mCursor = new Date(mCursor.getFullYear(), mCursor.getMonth()+1, 1);

  const SP_BANDS=[

  const todayPct = pct(new Date().toISOString().slice(0,10));
  // 5 groups instead of 8 — matches BAR_COLOR/.s-* grouping above
  const LEGEND=[
    ['#2a3048','Not Started'],['#5b8dee','In Progress'],['#7c5bde','In Review (SIT/QA/Reviewing)'],

  cont.appendChild(toolbar);
  updatePmAuthUI();
  initTlDropdowns();

  // ── Overdue banner (due passed, not not-started, not done) ──
  const _odRows=tlState.rows.filter(r=>r.due&&r.due<new Date().toISOString().slice(0,10)&&r.status!=='done'&&r.status!=='not-started');
  if(_odRows.length>0){

    odBanner.style.cssText='background:rgba(240,86,106,.08);border:1px solid rgba(240,86,106,.2);border-radius:6px;padding:7px 12px;margin-bottom:6px;font-size:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap';
    odBanner.innerHTML='<span style="color:#f0566a">⚠️ <strong>'+_odRows.length+' Epic overdue</strong></span><span style="color:var(--muted);font-size:10px">'+_odRows.map(r=>r.wbs).join(', ')+'</span>';
    cont.appendChild(odBanner);
  }

  // ── Not started banner ──
  const _nsRows=tlState.rows.filter(r=>r.status==='not-started');
  if(_nsRows.length>0){
    const nsBanner=document.createElement('div');
    nsBanner.style.cssText='background:rgba(107,117,149,.06);border:1px solid rgba(107,117,149,.2);border-radius:6px;padding:7px 12px;margin-bottom:10px;font-size:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap';

  /* ── Layout ──
