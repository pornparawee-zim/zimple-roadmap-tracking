    <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px;border-color:rgba(62,207,142,.4);color:#1e9e6e"
      onclick="openAddTask()"
      title="➕ Add Task — สร้าง task ใหม่ใน Timeline&#10;จะถูก push ขึ้น CU ผ่าน Export for Jarvis">
      ➕ Add Task
    </button>
    <button class="btn btn-primary" style="font-size:10px;padding:4px 10px"
      onclick="tlSaveNow()"
      title="💾 Save Timeline — บันทึก Timeline view ไว้ใน browser&#10;ข้อมูลยังไม่ถูก sync ไปที่ใด · refresh แล้วยังเห็นข้อมูลนี้">
      💾 Save Timeline
    </button>
  `;
  cont.appendChild(toolbar);
  updatePmAuthUI();
  initTlDropdowns();

  // ── Overdue banner (auto: due passed / manual: 🏷️ tagged in edit dialog) ──
  const _odRows=tlState.rows.filter(rowIsOverdue);
  if(_odRows.length>0){
    const odBanner=document.createElement('div');
    odBanner.style.cssText='background:rgba(240,86,106,.08);border:1px solid rgba(240,86,106,.2);border-radius:6px;padding:7px 12px;margin-bottom:6px;font-size:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;';
    odBanner.innerHTML='<span style="color:#f0566a">⚠️ <strong>'+_odRows.length+' Epic overdue</strong></span><span style="color:var(--muted);font-size:10px">'+_odRows.map(r=>r.wbs).join(', ')+'</span>';
    cont.appendChild(odBanner);
  }

  // ── Not started banner ──
  const _nsRows=tlState.rows.filter(r=>r.status==='not-started');
  if(_nsRows.length>0){
    const nsBanner=document.createElement('div');
    nsBanner.style.cssText='background:rgba(107,117,149,.06);border:1px solid rgba(107,117,149,.2);border-radius:6px;padding:7px 12px;margin-bottom:10px;font-size:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;';
    nsBanner.innerHTML='<span style="color:var(--muted)">📋 <strong>'+_nsRows.length+' Epic ยังไม่เริ่ม</strong></span><span style="color:var(--muted);font-size:10px">'+_nsRows.map(r=>r.wbs).join(', ')+'</span>';
    cont.appendChild(nsBanner);
  }

  /* ── Layout ──
     outerWrap
       ├─ stickyHdr  (fixed header, NOT inside scrollable area)
       └─ wrap        (scrolls both x and y)
             ├─ labelCol
             └─ chartCol
  ── */
  const outerWrap = document.createElement('div');
  // flex:1;min-height:0 lets this fill whatever's left of #timeline-content
  // (a flex column — see CSS) instead of sizing to its own content, which
  // is what lets #tl-wrap below size itself off *this* box instead of a
  // guessed viewport-height calc.
  outerWrap.style.cssText='border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0;';

  const wrap = document.createElement('div');
  wrap.id = 'tl-wrap';
  // flex:1;min-height:0 (rather than a hardcoded max-height guess) makes
  // #tl-wrap exactly fill outerWrap's remaining space below stickyHdr —
  // outerWrap in turn exactly fills #timeline-content's remaining space
  // below the toolbar/banners (see CSS above). The whole chain is now
  // pure-CSS and self-adjusting: however tall the overdue/not-started
  // banners happen to render, #tl-wrap's bottom edge (and its horizontal
  // scrollbar) always lands exactly at the visible bottom of the panel —
  // .main never needs to scroll, so that scrollbar can't end up off-screen
  // depending on which row/section is in view.
  // overflow-x:scroll (not auto) — auto only shows the horizontal scrollbar
  // when chartCol's fixed width actually exceeds the viewport, which on a
  // normal-width desktop window often just... doesn't happen once chartCol
  // is capped at a real per-month width (see chartCol below): 9 months at
  // 110px each fits comfortably in most windows, so there'd be nothing to
  // scroll and no scrollbar at all — even though the user explicitly asked
  // for it to always be visible as a UI affordance. `scroll` always
  // reserves the track and renders it (full-width thumb when there's
  // nothing to scroll yet, a real draggable thumb once the roadmap grows
  // wide enough to need it).
  wrap.style.cssText='display:flex;overflow-x:scroll;overflow-y:auto;min-width:0;flex:1;min-height:0;';

  const labelCol = document.createElement('div');
  labelCol.id = 'tl-label-col';
  // sticky + left:0 freezes the EPIC/TASK column to the left edge of `wrap`
  // (the scroll container) as the chart side pans horizontally — needs an
  // opaque background + a z-index above the bars/gridlines it now overlaps
  // while "floating" over whatever chart content has scrolled underneath it.
  // background must be var(--bg), not --surface — --surface (pure white in
  // light theme) doesn't match the grayish page background the row area
  // actually sits on, so any blank trailing space in a label row (after the
  // task name/icons, before the border-right) would paint as a visibly
  // mismatched white band running down every row. --bg is what the rows'
  // own chart-side background already resolves to, so this keeps the
  // column looking exactly like before, just pinned in place.
  labelCol.style.cssText='flex-shrink:0;width:'+TL_LABEL_W+'px;border-right:1px solid var(--border);'
    +'position:sticky;left:0;z-index:8;background:var(--bg)';


  const chartCol = document.createElement('div');
  chartCol.id = 'tl-chart-col';
  // Fixed width (flex:0 0 Npx — NOT flex:1), one real px-per-month, always.
  // flex:1 used to let chartCol *stretch* past this floor to fill any spare
  // viewport space, which is exactly what made "scroll to center today"
  // pointless whenever the full date range happened to fit on screen — with
  // nothing left to scroll, today just landed wherever its % position fell
  // in the full Jan–Sep span (often far from center, since most of that
  // span is the already-finished months before today). Keeping chartCol at
  // a stable width means there's always real, scrollable room on both sides
  // of "today" to actually center it in, and scrolling further out never
  // makes months thinner — only wrap's own leftover space (if the window is
  // very wide) goes unused, which is normal Gantt behavior.
  const _chartMinPx = Math.max(500, MONTH_MARKS.length*110);
  chartCol.style.cssText='flex:0 0 '+_chartMinPx+'px;position:relative';

  /* ── Chart header ── */
  /* ── Sticky header wrapper ── */
  const stickyHdr = document.createElement('div');
  stickyHdr.style.cssText='display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;overflow:hidden;';

  const labelHdr=document.createElement('div');
  labelHdr.id='tl-label-hdr';
  labelHdr.style.cssText='flex-shrink:0;width:'+TL_LABEL_W+'px;height:40px;display:flex;align-items:flex-end;padding:0 8px 4px;background:var(--surface);font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-right:1px solid var(--border);box-sizing:border-box;';
  labelHdr.textContent='Epic / Task';

  const chartHdrWrap = document.createElement('div');
  // chartHdrWrap is the fixed-size *viewport* onto the header — it must stay
  // sized to whatever's actually visible (flex:1, same as before), NOT the
  // full scrollable content width. chartHdr (below) is the wide inner content
  // that gets a real width set to match chartCol exactly, and slides inside
  // this viewport via chartHdrWrap.scrollLeft (kept in sync with wrap's
  // scroll further down). Putting the explicit width on chartHdrWrap instead
  // of chartHdr (an earlier attempt) broke that: once chartHdrWrap itself
  // equals chartCol's full width, it has nothing left to scroll, so the
  // header visually stops moving even while the body scrolls — exactly the
  // "เดือนและ Sprint ไม่เลื่อนตาม slide bar" symptom.
  chartHdrWrap.style.cssText='flex:1;overflow:hidden;position:relative;min-width:0;';

  const chartHdr = document.createElement('div');
  // Explicit width (kept in sync with chartCol via ResizeObserver below) so
  // chartHdr is the thing that actually overflows chartHdrWrap — that's what
  // makes chartHdrWrap.scrollLeft = wrap.scrollLeft (further down) have any
  // visible effect at all.
  chartHdr.style.cssText='position:relative;height:40px;background:var(--surface);width:'+_chartMinPx+'px;';
  MONTH_MARKS.forEach((m,i)=>{
    if(i===MONTH_MARKS.length-1)return;
    const left=pct(m.d), next=pct(MONTH_MARKS[i+1].d);
    const isCur = todayPct!==null && left<=todayPct && todayPct<next;
    const el=document.createElement('div');
    el.className='tl-month-cell'+(isCur?' is-current':'');
    el.style.cssText=`position:absolute;left:${left}%;width:${next-left}%;top:0;height:20px;
      display:flex;align-items:center;justify-content:center;
      font-size:9.5px;font-weight:600;letter-spacing:.4px;color:${isCur?'var(--yellow)':'var(--textdim)'};font-family:var(--mono)`;
    el.textContent=m.label; chartHdr.appendChild(el);
  });
  SP_BANDS.forEach(sp=>{
    const ps=pct(sp.s),pe=pct(sp.e); if(ps===null||pe===null)return;
    const el=document.createElement('div');
    el.className='tl-sp-pill'+(sp.cur?' is-current':'');
    el.style.cssText=`position:absolute;left:${ps}%;width:${pe-ps}%;top:21px;height:18px;margin-top:1px;
      background:${sp.cur?'rgba(245,166,35,.16)':'rgba(91,141,238,.08)'};
      border-left:1px solid ${sp.cur?'rgba(245,166,35,.35)':'rgba(91,141,238,.2)'};
      display:flex;align-items:center;justify-content:center;
      font-size:9px;font-family:var(--mono);font-weight:${sp.cur?600:400};
      color:${sp.cur?'var(--yellow)':'var(--accent)'}`;
    el.textContent=sp.label; chartHdr.appendChild(el);
  });
  if(todayPct!==null){
    const t=document.createElement('div');
    t.style.cssText=`position:absolute;left:${todayPct}%;top:0;width:2px;height:40px;background:var(--yellow);z-index:5;opacity:.85`;
    const flag=document.createElement('div');
    flag.className='tl-today-flag';
    flag.textContent='TODAY';
    t.appendChild(flag);
    chartHdr.appendChild(t);
  }

  chartHdrWrap.appendChild(chartHdr);
  stickyHdr.appendChild(labelHdr);
  stickyHdr.appendChild(chartHdrWrap);

  const ROW_H=32;
  let dragSrcIdx=null;

  /* ── addRow ── */
  function addRow(idx, row){
    const lRow=document.createElement('div');
    lRow.dataset.idx=idx;
    lRow.dataset.wbs=row.wbs;
    lRow.className='tl-row-label';
    lRow.style.cssText=`height:${ROW_H}px;min-height:${ROW_H}px;display:flex;align-items:center;padding:0 4px 0 8px;
      border-bottom:1px solid rgba(42,48,72,.3);font-size:10px;
      user-select:none;transition:background .1s;min-width:0;box-sizing:border-box;overflow:hidden;`;

    // drag handle
    const handle=document.createElement('span');
    handle.textContent='⠿';
    handle.style.cssText='font-size:13px;color:var(--muted);margin-right:5px;flex-shrink:0;cursor:grab;opacity:.5;padding:0 2px;';
    handle.title='ลากเพื่อเรียงใหม่';
    lRow.appendChild(handle);

    // ms color dot
    const dot=document.createElement('span');
    dot.style.cssText=`width:5px;height:5px;border-radius:50%;background:${row.msColor};flex-shrink:0;margin-right:4px`;
    lRow.appendChild(dot);

    // Due-soon urgency chip — only shown while "เรียงตาม Due date" is on,
    // since that's the moment the user is scanning specifically for what's
    // coming up next. Color ramps from red (today/overdue) → orange → yellow
    // → blue → gray the further out the due date is, so urgency reads at a
    // glance without having to read the actual date.
    if(tlSortByDue && row.due && row.status!=='done'){
      const _todayMid = new Date(new Date().toISOString().slice(0,10));
      const _days = Math.round((new Date(row.due) - _todayMid) / 86400000);
      let bg,fg,txt;
      if(_days < 0){ bg='#f0566a'; fg='#fff'; txt='เลย '+Math.abs(_days)+'d'; }
      else if(_days === 0){ bg='#f0566a'; fg='#fff'; txt='วันนี้'; }
      else if(_days <= 3){ bg='#f5a623'; fg='#1a1f36'; txt='อีก '+_days+'d'; }
      else if(_days <= 7){ bg='#f5d76e'; fg='#1a1f36'; txt='อีก '+_days+'d'; }
      else if(_days <= 14){ bg='rgba(91,141,238,.22)'; fg='#5b8dee'; txt='อีก '+_days+'d'; }
      else { bg='rgba(107,117,149,.15)'; fg='#8a93a8'; txt=_days+'d'; }
      const urg=document.createElement('span');
      urg.textContent=txt;
      urg.title='Due '+row.due;
      urg.style.cssText=`font-size:8px;font-family:var(--mono);font-weight:700;background:${bg};color:${fg};border-radius:3px;padding:1px 4px;margin-right:4px;flex-shrink:0;white-space:nowrap`;
      lRow.appendChild(urg);
    }

    // wbs
    const wbsEl=document.createElement('span');
    wbsEl.style.cssText='font-family:var(--mono);font-size:9px;color:var(--muted);margin-right:4px;flex-shrink:0';
    wbsEl.textContent=row.wbs;
    lRow.appendChild(wbsEl);

    // name
    const nameEl=document.createElement('span');
    nameEl.dataset.nameel='1';
    nameEl.dataset.fullname=row.name;
    nameEl.title=row.name;
    nameEl.style.cssText='flex:1;color:var(--textdim);min-width:0;line-height:1.4;overflow:hidden;';
    nameEl.textContent=row.name;
    if(row.stories&&row.stories.length>0){
      const _expanded = tlExpandedRows.has(row.wbs);
      const stInd=document.createElement('span');
      stInd.style.cssText='font-size:8px;color:var(--accent);margin-left:3px;flex-shrink:0;opacity:.85;cursor:pointer;padding:1px 3px;border-radius:3px';
      stInd.textContent=(_expanded?'▾ ':'▸ ')+row.stories.length;
      stInd.title=(_expanded?'ย่อ':'ขยายดู')+' '+row.stories.length+' stories เป็น bar แยกใน Timeline';
      stInd.addEventListener('click', e=>{ e.stopPropagation(); toggleRowExpand(row.wbs); });
      lRow.appendChild(nameEl);
      lRow.appendChild(stInd);
      // Roll up story-level Blocked up to the epic — mirrors the Roadmap
      // table's 🔴N indicator so a blocked story is visible in Timeline
      // without opening the story panel.
      const _blockedStoryCnt = row.stories.filter(s=>s.status==='blocked').length;
      if(_blockedStoryCnt){
        const bsb=document.createElement('span');
        bsb.style.cssText='font-size:8px;color:#fff;background:var(--red);border-radius:3px;padding:0 4px;margin-left:3px;flex-shrink:0;font-family:var(--mono)';
        bsb.textContent='🔴'+_blockedStoryCnt;
        bsb.title=_blockedStoryCnt+' story ติด Blocked';
        lRow.appendChild(bsb);
      }
    } else {
      lRow.appendChild(nameEl);
    }

    // ClickUp link — jump straight to the card, no need to open the edit dialog first
    const _epForCu = findEpic(row.wbs);
    if(_epForCu && _epForCu.ep.cuId && _epForCu.ep.cuUrl){
      const cuA=document.createElement('a');
      cuA.href=_epForCu.ep.cuUrl; cuA.target='_blank'; cuA.rel='noopener';
      cuA.className='cu-link';
      cuA.style.cssText='margin-left:3px;flex-shrink:0;font-size:8px;padding:1px 3px';
      cuA.textContent='↗';
      cuA.title='เปิด '+_epForCu.ep.cuId+' ใน ClickUp';
      cuA.addEventListener('click', e=>e.stopPropagation());
      lRow.appendChild(cuA);
    }

    // note indicator
    if(row.note){
      const ni=document.createElement('span');
      ni.title=row.note;
      ni.style.cssText='font-size:10px;flex-shrink:0;margin-left:3px';
      ni.textContent='📝';
      lRow.appendChild(ni);
    }

    // local task badge
    if(row._local){
      const nb=document.createElement('span');
      nb.className='local-task-badge';
      nb.textContent='NEW';
      nb.title='Task นี้สร้างเองใน Timeline — ยังไม่ได้ push ขึ้น CU';
      lRow.appendChild(nb);
    }
    // edit hint
    const hint=document.createElement('span');
    hint.style.cssText='font-size:9px;flex-shrink:0;margin-left:2px;opacity:.3';
    hint.textContent='✏';
    lRow.appendChild(hint);

    // click to edit — always the same edit modal, regardless of whether the
    // epic has stories. This used to branch to a read-only side panel
    // (openTLPanel) for epics with stories instead, which looked like
    // clicking "did nothing" next to epics that open the modal — same click
    // target, two different, inconsistent results. Viewing/editing child
    // stories still works exactly as before via the "▸ N stories" arrow
    // (toggleRowExpand, see stInd above) and each expanded story's own bar.
    lRow.addEventListener('click', ()=>{
      openTLEdit(idx);
    });
    // Overdue tag — just a small yellow "OD" next to the name. Overdue no
    // longer changes the bar's own color (that's reserved for status/blocked
    // — see the bar color logic below), this tag is the only overdue signal.
    // Shows up either automatically (due date passed) or because it was
    // tagged manually via the "🏷️ ติด tag Overdue เอง" checkbox in the
    // edit dialog (see openTLEdit/saveTLEdit).
    if(rowIsOverdue(row)){
      const ob = document.createElement('span');
      ob.style.cssText = 'font-size:8px;background:var(--yellow);color:#1a1f36;border-radius:3px;padding:1px 4px;margin-left:4px;flex-shrink:0;font-family:var(--mono);font-weight:600';
      ob.textContent = 'OD';
      ob.title = row.manualOD ? 'Overdue (ติด tag เอง)' : ('Overdue · due ' + row.due);
      lRow.appendChild(ob);
    }

    // ── Drag & Drop ──
    lRow.draggable = true;
    handle.style.cursor = 'grab';

    lRow.addEventListener('dragstart', e=>{
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/wbs', row.wbs);
      requestAnimationFrame(()=>lRow.classList.add('drag-src'));
    });
    lRow.addEventListener('dragend', ()=>{
      lRow.classList.remove('drag-src');
      document.querySelectorAll('.drop-line-above,.drop-line-below')
        .forEach(r=>r.classList.remove('drop-line-above','drop-line-below'));
    });
    lRow.addEventListener('dragover', e=>{
      if(e.dataTransfer.types.includes('text/ms-wbs')) return; // handled by labelCol-level delegation
      e.preventDefault();
      document.querySelectorAll('.drop-line-above,.drop-line-below')
        .forEach(r=>r.classList.remove('drop-line-above','drop-line-below'));
      const rect=lRow.getBoundingClientRect();
      lRow.classList.add(e.clientY<rect.top+rect.height/2?'drop-line-above':'drop-line-below');
    });
    lRow.addEventListener('dragleave', e=>{
      if(!lRow.contains(e.relatedTarget))
        lRow.classList.remove('drop-line-above','drop-line-below');
    });
    lRow.addEventListener('drop', e=>{
      if(e.dataTransfer.types.includes('text/ms-wbs')) return; // handled by labelCol-level delegation
      e.preventDefault();
      lRow.classList.remove('drop-line-above','drop-line-below');
      const rect=lRow.getBoundingClientRect();
      const above=e.clientY<rect.top+rect.height/2;

      const srcWbs=e.dataTransfer.getData('text/wbs');
      if(!srcWbs||srcWbs===row.wbs) return;
      const lc=document.getElementById('tl-label-col');
      const cc=document.getElementById('tl-chart-col');
      const srcL=lc.querySelector('[data-wbs="'+srcWbs+'"]');
      if(!srcL) return;
      const srcC=cc.querySelector('[data-crow-idx="'+srcL.dataset.idx+'"]');
      const dstC=cc.querySelector('[data-crow-idx="'+lRow.dataset.idx+'"]');
      if(!srcC||!dstC) return;
      if(above){ lc.insertBefore(srcL,lRow); cc.insertBefore(srcC,dstC); }
      else { lc.insertBefore(srcL,lRow.nextSibling); cc.insertBefore(srcC,dstC.nextSibling); }
      tlState.rows=[...lc.querySelectorAll('[data-wbs]')]
        .map(el=>tlState.rows.find(r=>r.wbs===el.dataset.wbs)).filter(Boolean);

      // Dropping onto a row from a *different* milestone isn't just a
      // reorder — it re-assigns the epic to that milestone for real. Without
      // this, srcRow.msId never changes, so the very next re-render for any
      // unrelated reason (e.g. reordering a milestone) recomputes
      // _sortedRows purely by msId and silently snaps the epic back to its
      // old milestone group — the "moved it, then it came back" bug.
      const srcRow = tlState.rows.find(r=>r.wbs===srcWbs);
      if(srcRow && srcRow.msId !== row.msId){
        const destMs = getDATA().find(m=>m.msId===row.msId);
        srcRow.msId = row.msId;
        srcRow.msColor = (destMs && destMs.msColor) || row.msColor;
        logHistory(`ย้าย ${srcWbs} ไป Milestone ${row.msId}`);
        reRenderKeepScroll();
      } else {
        logHistory(`ย้าย ${srcWbs} ไป${above?'ก่อน':'หลัง'} ${row.wbs}`);
      }
    });



    labelCol.appendChild(lRow);


    /* ── Chart row ── */
    const cRow=document.createElement('div');
    cRow.dataset.cidx=idx;
    cRow.dataset.crowIdx=idx;
    cRow.style.cssText=`height:${ROW_H}px;min-height:${ROW_H}px;position:relative;border-bottom:1px solid rgba(42,48,72,.25)`;

    // grid lines + sprint bg — kept faint so the bars stay the visual focus
    MONTH_MARKS.forEach(m=>{
      const p=pct(m.d); if(p===null)return;
      const ln=document.createElement('div');
      ln.style.cssText=`position:absolute;left:${p}%;top:0;width:1px;height:100%;background:rgba(107,117,149,.14)`;
      cRow.appendChild(ln);
    });
    SP_BANDS.forEach(sp=>{
      const ps=pct(sp.s),pe=pct(sp.e); if(ps===null||pe===null)return;
      const bg=document.createElement('div');
      bg.style.cssText=`position:absolute;left:${ps}%;width:${pe-ps}%;top:0;height:100%;
        background:${sp.cur?'rgba(245,166,35,.045)':'rgba(91,141,238,.025)'}`;
      cRow.appendChild(bg);
    });
    if(todayPct!==null){
      const t=document.createElement('div');
      t.style.cssText=`position:absolute;left:${todayPct}%;top:0;width:2px;height:100%;background:rgba(245,166,35,.5);z-index:3`;
      cRow.appendChild(t);
    }

    // Auto-calc: if every story under this epic has both a start and a due
    // date set, the epic bar spans min(story.start) → max(story.due)
    // instead of the epic's own manually-set start/due. Those manual fields
    // are left untouched in tlState — this only changes what's *rendered*,
    // so the epic gracefully falls back to its own dates the moment any
    // story's dates become incomplete again.
    const _dated = (row.stories||[]).filter(s=>s.start&&s.due);
    const _autoCalc = row.stories && row.stories.length>0 && _dated.length===row.stories.length;
    let _effStart = row.start, _effDue = row.due;
    if(_autoCalc){
      _effStart = _dated.reduce((m,s)=>(!m||s.start<m)?s.start:m, null);
      _effDue   = _dated.reduce((m,s)=>(!m||s.due>m)?s.due:m, null);
    }
    const span=pctSpan(_effStart, _effDue);
    if(span){
      // Bar color = status color, EXCEPT: a blocked child story rolls up
      // and colors the epic's own bar Blocked too, even if the epic's own
      // status field says something else — a blocked story is always the
      // more urgent signal. Overdue no longer forces a color here; it only
      // shows as the small yellow "OD" tag on the label (see above).
      const _hasBlockedStory = (row.stories||[]).some(s=>s.status==='blocked');
      const _isBlocked = row.status==='blocked' || row.status==='delayed' || _hasBlockedStory;
      const color = _isBlocked ? BAR_COLOR['blocked'] : (BAR_COLOR[row.status]||BAR_COLOR['not-started']);
      const bar=document.createElement('div');
      bar.title='';  // disable native tooltip
      // Tooltip should reflect the *rendered* range — when auto-calc is on,
      // that's the story roll-up, not the epic's own (possibly stale/blank)
      // start/due fields.
      const _tipRow = _autoCalc ? {...row, start:_effStart, due:_effDue} : row;
      bar.addEventListener('mouseenter', e=>showTip(e,_tipRow));
      bar.addEventListener('mousemove',  e=>moveTip(e));
      bar.addEventListener('mouseleave', hideTip);
      attachLongPressTip(bar, _tipRow); // touch devices: long-press shows the same tooltip (incl. the note)
      const isDueOnly = span.dueOnly;
      // Set bar style cleanly (no nested template literals in cssText).
      // Radius/shadow/hover-lift live in the .tl-bar CSS class (see the
      // "Timeline visual pass" block up top) — only the per-status fill
      // color and exact position/size stay inline here since those are
      // computed per-row.
      bar.className='tl-bar';
      bar.style.position='absolute';
      bar.style.left=span.left+'%';
      bar.style.width=span.width+'%';
      bar.style.top='50%';
      bar.style.transform='translateY(-50%)';
      bar.style.height='18px';
      bar.style.background=color;
      bar.style.display='flex';
      bar.style.alignItems='center';
      bar.style.fontSize='8px';
      bar.style.fontWeight='600';
      bar.style.color='rgba(255,255,255,.92)';
      bar.style.fontFamily='var(--mono)';
      bar.style.whiteSpace='nowrap';
      bar.style.zIndex='2';
      if(isDueOnly){
        bar.style.opacity='0.8';
        bar.style.border='2px dashed rgba(255,255,255,.7)';
        bar.style.cursor='pointer';
        bar.style.justifyContent='center';
        bar.addEventListener('click',e=>{e.stopPropagation();openTLEdit(idx);});
      }

      // progress overlay
      if(row.pct>0 && !isDueOnly){
        const pg=document.createElement('div');
        pg.style.cssText='position:absolute;left:0;top:0;width:'+row.pct+'%;height:100%;background:rgba(255,255,255,.18);border-radius:9px 0 0 9px;pointer-events:none';
        bar.appendChild(pg);
      }

      // Small note-indicator badge, visible without hovering, so it's clear
      // at a glance which bars have a note — hover (or long-press on touch)
      // then shows the actual note text in the tooltip.
      if(row.note){
        const nb=document.createElement('span');
        nb.textContent='📝';
        nb.style.cssText='position:absolute;top:-7px;right:-4px;font-size:9px;line-height:1;pointer-events:none;z-index:3;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))';
        bar.appendChild(nb);
      }

      // Auto-calc indicator — small chain icon, top-left, when this bar's
      // span comes from rolling up story dates instead of the epic's own
      // manually-set start/due (see _autoCalc above).
      if(_autoCalc && !isDueOnly){
        const ac=document.createElement('span');
        ac.textContent='🔗';
        ac.title='คำนวณอัตโนมัติจาก start/due ของ story ย่อย — ลาก/ยืดแท่งนี้ไม่ได้ แก้ที่ story แทน';
        ac.style.cssText='position:absolute;top:-7px;left:-4px;font-size:9px;line-height:1;pointer-events:none;z-index:3;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))';
        bar.appendChild(ac);
      }

      // left resize handle (hide for due-only, and for auto-calc bars —
      // dragging would have no lasting effect since the next render just
      // recomputes the span from story dates again)
      if(!isDueOnly && !_autoCalc){
        const lh=document.createElement('div');
        lh.className='tl-bar-handle';
        lh.style.cssText='width:6px;height:100%;cursor:ew-resize;flex-shrink:0;background:rgba(0,0,0,.22);border-radius:9px 0 0 9px;display:flex;align-items:center;justify-content:center;';
        lh.innerHTML='<span style="font-size:7px;color:rgba(255,255,255,.6);letter-spacing:-1px">⋮</span>';
        bar.appendChild(lh);
        setupResize(lh,'left');
      }

      // label
      const lbl=document.createElement('span');
      lbl.style.cssText='flex:1;text-align:center;position:relative;z-index:1;overflow:hidden;cursor:pointer;padding:0 2px';
      lbl.textContent=isDueOnly?('📌 '+row.wbs):row.wbs;
      lbl.addEventListener('click',e=>{e.stopPropagation();openTLEdit(idx);});
      bar.appendChild(lbl);

      // right resize handle (hide for due-only / auto-calc — see above)
      if(!isDueOnly && !_autoCalc){
        const rh=document.createElement('div');
        rh.className='tl-bar-handle';
        rh.style.cssText='width:6px;height:100%;cursor:ew-resize;flex-shrink:0;background:rgba(0,0,0,.22);border-radius:0 9px 9px 0;display:flex;align-items:center;justify-content:center;';
        rh.innerHTML='<span style="font-size:7px;color:rgba(255,255,255,.6);letter-spacing:-1px">⋮</span>';
        bar.appendChild(rh);
        setupResize(rh,'right');
      }

      // ── Resize drag logic ──
      // pctToDate: convert % position → ISO date string
      function pctToDate(p){
        const ms = REF.getTime() + (p/100)*TOTAL*86400000;
        return new Date(ms).toISOString().slice(0,10);
      }

      function setupResize(handle, side){
        handle.addEventListener('mousedown', e=>{
          e.stopPropagation(); e.preventDefault();
          const chartRect = chartCol.getBoundingClientRect();
          const origLeft  = parseFloat(bar.style.left);
          const origWidth = parseFloat(bar.style.width);
          const startX    = e.clientX;

          // tooltip showing date
          const tip=document.createElement('div');
          tip.style.cssText=`position:fixed;background:var(--surface);border:1px solid var(--border);
            color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 7px;
            border-radius:4px;z-index:999;pointer-events:none`;
          document.body.appendChild(tip);

          function onMove(ev){
            const dx = (ev.clientX - startX) / chartRect.width * 100;
            let newLeft=origLeft, newWidth=origWidth;

            if(side==='left'){
              newLeft  = Math.max(0, Math.min(origLeft+origWidth-1, origLeft+dx));
              newWidth = origWidth - (newLeft - origLeft);
            } else {
              newWidth = Math.max(1, origWidth+dx);
            }

            bar.style.left  = newLeft+'%';
            bar.style.width = newWidth+'%';

            const d = side==='left'
              ? pctToDate(newLeft)
              : pctToDate(newLeft+newWidth);
            tip.textContent = d;
            tip.style.left=(ev.clientX+10)+'px';
            tip.style.top =(ev.clientY-24)+'px';
          }

          function onUp(ev){
            document.removeEventListener('mousemove',onMove);
            document.removeEventListener('mouseup',onUp);
            tip.remove();
            const newLeft  = parseFloat(bar.style.left);
            const newWidth = parseFloat(bar.style.width);
            const _before = { start: tlState.rows[idx].start, due: tlState.rows[idx].due };
            if(side==='left'){
              tlState.rows[idx].start = pctToDate(newLeft);
            } else {
              tlState.rows[idx].due   = pctToDate(newLeft+newWidth);
            }
            // NOTE: intentionally NOT setting bar.title here — bar.title is
            // kept permanently empty (see "disable native tooltip" above) so
            // the browser's plain native tooltip never reappears and fights
            // with the custom, styled showTip()/hideTip() hover tooltip
            // (which already reads the row fresh on every hover, so it
            // doesn't need a cached title string anyway).
            const r=tlState.rows[idx];
            const _desc = side==='left'
              ? `${r.wbs}: เลื่อน start date ${_before.start||'—'} → ${r.start}`
              : `${r.wbs}: เลื่อน due date ${_before.due||'—'} → ${r.due}`;
            const _changed = side==='left' ? _before.start!==r.start : _before.due!==r.due;
            if(_changed) promptChangeNote(r, _desc); // skippable popup for an optional reason
          }

          document.addEventListener('mousemove',onMove);
          document.addEventListener('mouseup',onUp);
        });
      }



      // bar body drag (move whole bar) — disabled for auto-calc bars (see above)
      lbl.addEventListener('mousedown',e=>{
        if(e.button!==0 || _autoCalc) return;
        e.stopPropagation(); e.preventDefault();
        const chartRect=chartCol.getBoundingClientRect();
        const origLeft =parseFloat(bar.style.left);
        const origWidth=parseFloat(bar.style.width);
        const startX   =e.clientX;

        const tip=document.createElement('div');
        tip.style.cssText=`position:fixed;background:var(--surface);border:1px solid var(--border);
          color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 7px;
          border-radius:4px;z-index:999;pointer-events:none`;
        document.body.appendChild(tip);

        function onMove(ev){
          const dx=(ev.clientX-startX)/chartRect.width*100;
          const nl=Math.max(0,Math.min(100-origWidth,origLeft+dx));
          bar.style.left=nl+'%';
          const s=pctToDate(nl), d=pctToDate(nl+origWidth);
          tip.textContent=s+' → '+d;
          tip.style.left=(ev.clientX+10)+'px';
          tip.style.top=(ev.clientY-24)+'px';
        }
        function onUp(ev){
          document.removeEventListener('mousemove',onMove);
          document.removeEventListener('mouseup',onUp);
          tip.remove();
          const nl=parseFloat(bar.style.left);
          const _before = { start: tlState.rows[idx].start, due: tlState.rows[idx].due };
          tlState.rows[idx].start=pctToDate(nl);
          tlState.rows[idx].due  =pctToDate(nl+origWidth);
          const r=tlState.rows[idx];
          // (bar.title intentionally left empty — see the resize handler's
          // comment above; the custom hover tooltip covers this instead.)
          if(_before.start!==r.start || _before.due!==r.due){
            promptChangeNote(r, `${r.wbs}: ย้ายทั้งแท่ง ${_before.start||'—'}→${r.start}, ${_before.due||'—'}→${r.due}`);
          }
        }
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
      });

      cRow.appendChild(bar);
    } else {
      // No date — show dashed placeholder that opens edit modal on click
      const ph=document.createElement('div');
      ph.title='ยังไม่มี date — คลิกเพื่อเพิ่ม';
      ph.style.cssText=`position:absolute;left:2%;width:30%;top:50%;transform:translateY(-50%);height:14px;
        border-radius:3px;border:1.5px dashed rgba(107,117,149,.4);
        display:flex;align-items:center;justify-content:center;
        font-size:8px;color:var(--muted);font-family:var(--mono);
        cursor:pointer;z-index:2`;
      ph.textContent=`${row.wbs} · no date`;
      ph.addEventListener('click',e=>{e.stopPropagation();openTLEdit(idx);});
      cRow.appendChild(ph);
    }
    chartCol.appendChild(cRow);
  }

  /* ── addStoryRow — one indented label+bar row for a single story under
     an expanded epic. Mirrors addRow's bar (drag/resize/click-to-edit,
     tooltip, note badge, OD tag) but scoped to a story instead of an
     epic row, and without the epic-only features (milestone drag,
     row-reorder drag, blocked-story rollup). Persists by mutating the
     story object living inside tlState.rows[epicIdx].stories directly —
     the same "always look it up by id, never trust a cached index"
     discipline as the epic-level idx fix earlier this session, since a
     story's position within its array never changes but re-fetching by
     id keeps this robust if that ever changes. ── */
  function addStoryRow(epicIdx, epicRow, story){
    const stColors={'done':'#3ecf8e','in-progress':'#5b8dee','blocked':'#f0566a','delayed':'#f0566a','not-started':'#6b7595','sit-ready':'#7c5bde','qa-testing':'#7c5bde','reviewing':'#7c5bde','dev-testing':'#5b8dee'};
    const SROW_H = ROW_H-6;

    function findStory(){
      const er=tlState.rows[epicIdx];
      return er&&er.stories ? er.stories.find(s=>s.id===story.id) : null;
    }

    /* label row */
    const sRow=document.createElement('div');
    sRow.dataset.storyId=story.id;
    sRow.className='tl-row-label';
    sRow.style.cssText=`height:${SROW_H}px;min-height:${SROW_H}px;display:flex;align-items:center;padding:0 4px 0 26px;
      border-bottom:1px solid rgba(42,48,72,.2);font-size:9px;color:var(--muted);
      user-select:none;min-width:0;box-sizing:border-box;overflow:hidden;background:rgba(255,255,255,.015);`;

    const dot=document.createElement('span');
    dot.style.cssText=`width:4px;height:4px;border-radius:50%;background:${stColors[story.status]||'#6b7595'};flex-shrink:0;margin-right:5px`;
    sRow.appendChild(dot);

    const codeEl=document.createElement('span');
    codeEl.style.cssText='font-family:var(--mono);font-size:8px;color:var(--muted);margin-right:4px;flex-shrink:0';
    codeEl.textContent=story.code||story.id;
    sRow.appendChild(codeEl);

    const nameEl=document.createElement('span');
    nameEl.title=story.name;
    nameEl.style.cssText='flex:1;color:var(--textdim);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
    nameEl.textContent=story.name;
    sRow.appendChild(nameEl);

    // ClickUp link — jump straight to the story's card
    if(story.url){
      const cuA=document.createElement('a');
      cuA.href=story.url; cuA.target='_blank'; cuA.rel='noopener';
      cuA.className='cu-link';
      cuA.style.cssText='margin-left:3px;flex-shrink:0;font-size:7px;padding:0 3px';
      cuA.textContent='↗';
      cuA.title='เปิด '+(story.code||story.id)+' ใน ClickUp';
      cuA.addEventListener('click', e=>e.stopPropagation());
      sRow.appendChild(cuA);
    }

    if(story.note){
      const ni=document.createElement('span');
      ni.title=story.note;
      ni.style.cssText='font-size:9px;flex-shrink:0;margin-left:3px';
      ni.textContent='📝';
      sRow.appendChild(ni);
    }

    if(rowIsOverdue(story)){
      const ob=document.createElement('span');
      ob.style.cssText='font-size:7px;background:var(--yellow);color:#1a1f36;border-radius:3px;padding:0 3px;margin-left:4px;flex-shrink:0;font-family:var(--mono);font-weight:600';
      ob.textContent='OD';
      ob.title=story.manualOD?'Overdue (ติด tag เอง)':('Overdue · due '+story.due);
      sRow.appendChild(ob);
    }

    sRow.addEventListener('click', ()=>openTLStoryEdit(epicIdx, story.id));
    labelCol.appendChild(sRow);

    /* chart row */
    const cRow=document.createElement('div');
    cRow.style.cssText=`height:${SROW_H}px;min-height:${SROW_H}px;position:relative;border-bottom:1px solid rgba(42,48,72,.15);background:rgba(255,255,255,.01)`;

    MONTH_MARKS.forEach(m=>{
      const p=pct(m.d); if(p===null)return;
      const ln=document.createElement('div');
      ln.style.cssText=`position:absolute;left:${p}%;top:0;width:1px;height:100%;background:rgba(107,117,149,.1)`;
      cRow.appendChild(ln);
    });
    if(todayPct!==null){
      const t=document.createElement('div');
      t.style.cssText=`position:absolute;left:${todayPct}%;top:0;width:2px;height:100%;background:rgba(245,166,35,.35);z-index:3`;
      cRow.appendChild(t);
    }

    const span=pctSpan(story.start, story.due);
    if(span){
      const _isBlocked = story.status==='blocked' || story.status==='delayed';
      const color = _isBlocked ? BAR_COLOR['blocked'] : (BAR_COLOR[story.status]||BAR_COLOR['not-started']);
      const bar=document.createElement('div');
      bar.title='';
      const _tipRow={ wbs: story.code||story.id, name: story.name, start: story.start, due: story.due, status: story.status, pct: story.status==='done'?100:0, note: story.note||'' };
      bar.addEventListener('mouseenter', e=>showTip(e,_tipRow));
      bar.addEventListener('mousemove', e=>moveTip(e));
      bar.addEventListener('mouseleave', hideTip);
      attachLongPressTip(bar, _tipRow);
      const isDueOnly=span.dueOnly;
      bar.style.position='absolute';
      bar.style.left=span.left+'%';
      bar.style.width=span.width+'%';
      bar.style.top='50%';
      bar.className='tl-bar tl-bar-sm';
      bar.style.transform='translateY(-50%)';
      bar.style.height='13px';
      bar.style.background=color;
      bar.style.opacity='.88';
      bar.style.display='flex';
      bar.style.alignItems='center';
      bar.style.fontSize='7px';
      bar.style.fontWeight='600';
      bar.style.color='rgba(255,255,255,.92)';
      bar.style.fontFamily='var(--mono)';
      bar.style.whiteSpace='nowrap';
      bar.style.zIndex='2';
      if(isDueOnly){
        bar.style.border='1.5px dashed rgba(255,255,255,.7)';
        bar.style.cursor='pointer';
        bar.style.justifyContent='center';
        bar.addEventListener('click',e=>{e.stopPropagation();openTLStoryEdit(epicIdx, story.id);});
      }

      if(story.note){
        const nb=document.createElement('span');
        nb.textContent='📝';
        nb.style.cssText='position:absolute;top:-6px;right:-3px;font-size:8px;line-height:1;pointer-events:none;z-index:3;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))';
        bar.appendChild(nb);
      }

      function pctToDate(p){
        const ms = REF.getTime() + (p/100)*TOTAL*86400000;
        return new Date(ms).toISOString().slice(0,10);
      }

      function setupStoryResize(handle, side){
        handle.addEventListener('mousedown', e=>{
          e.stopPropagation(); e.preventDefault();
          const chartRect=chartCol.getBoundingClientRect();
          const origLeft=parseFloat(bar.style.left);
          const origWidth=parseFloat(bar.style.width);
          const startX=e.clientX;
          const tip=document.createElement('div');
          tip.style.cssText=`position:fixed;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:4px;z-index:999;pointer-events:none`;
          document.body.appendChild(tip);
          function onMove(ev){
            const dx=(ev.clientX-startX)/chartRect.width*100;
            let newLeft=origLeft, newWidth=origWidth;
            if(side==='left'){
              newLeft=Math.max(0,Math.min(origLeft+origWidth-1, origLeft+dx));
              newWidth=origWidth-(newLeft-origLeft);
            } else {
              newWidth=Math.max(1, origWidth+dx);
            }
            bar.style.left=newLeft+'%'; bar.style.width=newWidth+'%';
            const d = side==='left'?pctToDate(newLeft):pctToDate(newLeft+newWidth);
            tip.textContent=d;
            tip.style.left=(ev.clientX+10)+'px'; tip.style.top=(ev.clientY-24)+'px';
          }
          function onUp(ev){
            document.removeEventListener('mousemove',onMove);
            document.removeEventListener('mouseup',onUp);
            tip.remove();
            const newLeft=parseFloat(bar.style.left);
            const newWidth=parseFloat(bar.style.width);
            const s=findStory(); if(!s) return;
            const _before={start:s.start, due:s.due};
            if(side==='left') s.start=pctToDate(newLeft);
            else s.due=pctToDate(newLeft+newWidth);
            const _desc = side==='left'
              ? `${epicRow.wbs}/${s.code||s.id}: เลื่อน start date ${_before.start||'—'} → ${s.start}`
              : `${epicRow.wbs}/${s.code||s.id}: เลื่อน due date ${_before.due||'—'} → ${s.due}`;
            const _changed = side==='left' ? _before.start!==s.start : _before.due!==s.due;
            if(_changed) promptChangeNote(s, _desc);
          }
          document.addEventListener('mousemove',onMove);
          document.addEventListener('mouseup',onUp);
        });
      }

      if(!isDueOnly){
        const lh=document.createElement('div');
        lh.className='tl-bar-handle';
        lh.style.cssText='width:5px;height:100%;cursor:ew-resize;flex-shrink:0;background:rgba(0,0,0,.22);border-radius:6px 0 0 6px';
        bar.appendChild(lh);
        setupStoryResize(lh,'left');
      }

      const lbl=document.createElement('span');
      lbl.style.cssText='flex:1;text-align:center;position:relative;z-index:1;overflow:hidden;cursor:pointer;padding:0 2px';
      lbl.textContent=isDueOnly?('📌 '+(story.code||story.id)):(story.code||story.id);
      lbl.addEventListener('click',e=>{e.stopPropagation();openTLStoryEdit(epicIdx, story.id);});
      bar.appendChild(lbl);

      if(!isDueOnly){
        const rh=document.createElement('div');
        rh.className='tl-bar-handle';
        rh.style.cssText='width:5px;height:100%;cursor:ew-resize;flex-shrink:0;background:rgba(0,0,0,.22);border-radius:0 6px 6px 0';
        bar.appendChild(rh);
        setupStoryResize(rh,'right');
      }

      lbl.addEventListener('mousedown', e=>{
        if(e.button!==0) return;
        e.stopPropagation(); e.preventDefault();
        const chartRect=chartCol.getBoundingClientRect();
        const origLeft=parseFloat(bar.style.left);
        const origWidth=parseFloat(bar.style.width);
        const startX=e.clientX;
        const tip=document.createElement('div');
        tip.style.cssText=`position:fixed;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:4px;z-index:999;pointer-events:none`;
        document.body.appendChild(tip);
        function onMove(ev){
          const dx=(ev.clientX-startX)/chartRect.width*100;
          const nl=Math.max(0,Math.min(100-origWidth,origLeft+dx));
          bar.style.left=nl+'%';
          const s=pctToDate(nl), d=pctToDate(nl+origWidth);
          tip.textContent=s+' → '+d;
          tip.style.left=(ev.clientX+10)+'px'; tip.style.top=(ev.clientY-24)+'px';
        }
        function onUp(ev){
          document.removeEventListener('mousemove',onMove);
          document.removeEventListener('mouseup',onUp);
          tip.remove();
          const nl=parseFloat(bar.style.left);
          const s=findStory(); if(!s) return;
          const _before={start:s.start, due:s.due};
          s.start=pctToDate(nl);
          s.due=pctToDate(nl+origWidth);
          if(_before.start!==s.start || _before.due!==s.due){
            promptChangeNote(s, `${epicRow.wbs}/${s.code||s.id}: ย้ายทั้งแท่ง ${_before.start||'—'}→${s.start}, ${_before.due||'—'}→${s.due}`);
          }
        }
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
      });

      cRow.appendChild(bar);
    } else {
      const ph=document.createElement('div');
      ph.title='ยังไม่มี date — คลิกเพื่อเพิ่ม';
      ph.style.cssText=`position:absolute;left:2%;width:26%;top:50%;transform:translateY(-50%);height:11px;
        border-radius:3px;border:1px dashed rgba(107,117,149,.4);
        display:flex;align-items:center;justify-content:center;
        font-size:7px;color:var(--muted);font-family:var(--mono);cursor:pointer;z-index:2`;
      ph.textContent=`${story.code||story.id} · no date`;
      ph.addEventListener('click',e=>{e.stopPropagation();openTLStoryEdit(epicIdx, story.id);});
      cRow.appendChild(ph);
    }
    chartCol.appendChild(cRow);
  }

  // Sort rows by milestone order before rendering — persisted per-product in tlState.msOrder
  const _DEFAULT_MS_ORDER = ['MS-A0','MS-A1','MS-A2','MS-A3','MS-A4','MS-A5','MS-A6','MS-A7','MS-B0','MS-B1','MS-EC-A1','MS-MISC'];
  if(!tlState.msOrder || !tlState.msOrder.length) tlState.msOrder = [..._DEFAULT_MS_ORDER];
  // Append any msId present in DATA but missing from the saved order (newly added milestones)
  // Skip anything the user deleted via deleteMilestone() — otherwise this
  // "backfill any milestone missing from msOrder" step would silently
  // re-insert it on every render (getDATA() itself doesn't know about
  // deletedMs; only mergeState's row-building does).
  const _deletedMsSet = new Set(tlState.deletedMs||[]);
  getDATA().forEach(ms=>{ if(!_deletedMsSet.has(ms.msId) && !tlState.msOrder.includes(ms.msId)) tlState.msOrder.push(ms.msId); });
  const _MS_ORDER = tlState.msOrder;
  // Which milestones have at least one dated task — only computed when the
  // due-date sort is on, so a whole milestone with nothing dated (e.g. a
  // backlog milestone that's all "no date") can sink below every milestone
  // that has real dates, instead of sitting in its normal structural spot.
  const _msHasDate = {};
  // Nearest due date across all epics in each milestone — only computed
  // when the due-date sort is on. Lets a whole milestone bubble up above
  // another milestone (within the same "has a date" tier) when its own
  // soonest task is sooner, instead of always deferring to the fixed
  // structural milestone order (A0→A1→A2→...).
  const _msEarliestDue = {};
  if(tlSortByDue){
    tlState.rows.forEach(r=>{
      if(r.due){
        _msHasDate[r.msId] = true;
        const t = new Date(r.due).getTime();
        if(_msEarliestDue[r.msId]===undefined || t < _msEarliestDue[r.msId]) _msEarliestDue[r.msId] = t;
      }
    });
  }
  const _sortedRows = [...tlState.rows].sort((a,b)=>{
    const ai = _MS_ORDER.indexOf(a.msId);
    const bi = _MS_ORDER.indexOf(b.msId);
    const am = ai<0 ? 99 : ai;
    const bm = bi<0 ? 99 : bi;
    // MS-MISC ("📌 Tasks · ไม่อยู่ใน Milestone") is a catch-all bucket, not a
    // real milestone with its own deadline — it shouldn't compete for rank
    // against A0-A7 just because one task inside it happens to be due soon
    // (that would drag every other, possibly far-out, task in the bucket up
    // the page along with it). So skip both the tier-sink and the
    // earliest-due bubble-up whenever either side is MS-MISC vs. a
    // different milestone, and fall straight through to the fixed
    // structural position below — MS-MISC always stays right where it sits
    // in tlState.msOrder (last, by default).
    const aIsMisc = a.msId === 'MS-MISC';
    const bIsMisc = b.msId === 'MS-MISC';
    const miscVsOther = (aIsMisc || bIsMisc) && a.msId !== b.msId;
    if(tlSortByDue && !miscVsOther){
      const aTier = _msHasDate[a.msId] ? 0 : 1;
      const bTier = _msHasDate[b.msId] ? 0 : 1;
      if(aTier !== bTier) return aTier - bTier;
      // Within the dated tier, sort milestones themselves by their nearest
      // due date — a milestone whose soonest task is next month should
      // surface above one whose soonest task is three months out.
      if(aTier === 0 && a.msId !== b.msId){
        const amsd = _msEarliestDue[a.msId];
        const bmsd = _msEarliestDue[b.msId];
        if(amsd !== bmsd) return amsd - bmsd;
      }
    }
    if(am !== bm) return am - bm;
    // Optional: within each milestone, nearest due date first (toggle in
    // toolbar) — but ONLY between two rows that both actually have a due
    // date. An epic with no date is left exactly where it already sat
    // (structural/drag order), instead of being forced to the bottom of its
    // milestone — that "sink to the bottom" treatment only applies one level
    // up, at the whole-milestone tier above. Array.sort is stable, so this
    // falls through to "return 0" whenever either side lacks a date, and the
    // existing manual drag order is preserved exactly.
    if(tlSortByDue && a.due && b.due){
      const ad = new Date(a.due).getTime();
      const bd = new Date(b.due).getTime();
      if(ad !== bd) return ad - bd;
    }
    return 0;
  });

  // Shared milestone-reorder logic — callable from the milestone header row itself
  // AND from any epic row (see below), since the milestone header band is only
  // ~34px tall and easy to miss when dropping — accepting the drop on any row
  // belonging to the target milestone group makes the feature actually usable.
  function performMsReorder(srcMsId, dstMsId, above){
    if(!srcMsId || srcMsId===dstMsId) return;
    const srcI = _MS_ORDER.indexOf(srcMsId);
    const dstI = _MS_ORDER.indexOf(dstMsId);
    if(srcI<0||dstI<0) return;
    _MS_ORDER.splice(srcI,1);
    const newDstI = _MS_ORDER.indexOf(dstMsId);
    _MS_ORDER.splice(above ? newDstI : newDstI+1, 0, srcMsId);
    logHistory(`ย้าย milestone ${srcMsId} ไป${above?'ก่อน':'หลัง'} ${dstMsId}`);
    reRenderKeepScroll();
  }

  // Render all rows with inline milestone headers
  let _lastMsId = null;
  const _msNameMap = {};
  getDATA().forEach(ms=>{ _msNameMap[ms.msId] = (ms.msName||ms.msId).replace(/^MS-\w+\s·\s/,'').replace(/^📌\s*/,''); });

  // Pre-compute done/total per msId from visible rows
  const _msStat = {};
  _sortedRows.forEach(row=>{
    if(fMS && row.msId!==fMS) return;
    if(fSt && row.status!==fSt) return;
    if(fSP && !(row.sprints||[]).includes(fSP)) return;
    if(!_msStat[row.msId]) _msStat[row.msId]={done:0,total:0};
    _msStat[row.msId].total++;
    if(row.status==='done') _msStat[row.msId].done++;
  });

  _sortedRows.forEach((row)=>{
    if(fMS && row.msId !== fMS) return;
    if(fSt && row.status !== fSt) return;
    if(fSP && !(row.sprints||[]).includes(fSP)) return;

    // IMPORTANT: idx must be the row's real position in tlState.rows (the
    // storage array), not its position in _sortedRows (a milestone-grouped,
    // optionally due-date-sorted display COPY). Every handler below —
    // openTLEdit/saveTLEdit, bar drag/resize, addRow's click handler — reads
    // and writes tlState.rows[idx] directly, so using the display-loop
    // index here would silently edit whichever row happens to sit at that
    // position in the real array once display order and storage order
    // diverge (any milestone reorder, any epic drag-drop, or the due-date
    // sort toggle). _sortedRows holds the same object references as
    // tlState.rows, so indexOf-by-reference reliably finds the real slot.
    const idx = tlState.rows.indexOf(row);

    // Inject milestone header when msId changes
    if(row.msId !== _lastMsId){
      _lastMsId = row.msId;
      const _col = row.msColor||'#6b7595';
      const _msName = _msNameMap[row.msId]||row.msId;
      const _stat = _msStat[row.msId]||{done:0,total:0};
      const _pct = _stat.total>0?Math.round(_stat.done/_stat.total*100):0;

      // Label col milestone header
      const msLRow = document.createElement('div');
      msLRow.dataset.msWbs = row.msId;
      msLRow.className = 'tl-ms-header';
      msLRow.style.cssText += ';border-bottom-color:'+_col+'55;border-left-color:'+_col+';background:'+_col+'12';
      const _msCode = row.msId.replace('MS-','').replace('-MISC','');
      msLRow.innerHTML = '<span class="tl-ms-dot" style="background:'+_col+'"></span>'
        +'<span class="tl-ms-code" style="color:'+_col+'">'+_msCode+'</span>'
        +'<span class="tl-ms-label">'+_msName+'</span>'
        +'<span class="tl-ms-prog" style="color:'+_col+'">'+_stat.done+'/'+_stat.total+'</span>';
      // Delete-whole-milestone button — cascades to every epic (and their
      // stories) currently grouped under it. See deleteMilestone().
      const msDelBtn = document.createElement('span');
      msDelBtn.textContent = '🗑';
      msDelBtn.className = 'tl-ms-del';
      msDelBtn.title = 'ลบ Milestone นี้ทั้งหมด (รวม epic/story ข้างใน)';
      msDelBtn.addEventListener('click', e=>{ e.stopPropagation(); deleteMilestone(row.msId); });
      msLRow.appendChild(msDelBtn);
      // Drag handle for milestone
      const msHandle = document.createElement('span');
      msHandle.textContent = '⠿';
      msHandle.className = 'tl-ms-handle';
      msHandle.title = 'ลากเพื่อเรียง Milestone';
      msLRow.insertBefore(msHandle, msLRow.firstChild);

      // Milestone drag events
      msLRow.draggable = true;
      msLRow.addEventListener('dragstart', e=>{
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/ms-wbs', row.msId);
        requestAnimationFrame(()=>msLRow.classList.add('drag-src'));
      });
      msLRow.addEventListener('dragend', ()=>{
        msLRow.classList.remove('drag-src');
        document.querySelectorAll('.drop-line-above,.drop-line-below').forEach(r=>r.classList.remove('drop-line-above','drop-line-below'));
      });
      // dragover/drop for milestone reordering is handled by ONE delegated
      // listener on labelCol (see below) instead of per-row — a per-row
      // listener on this thin 34px header was unreliable to land a drop on.
      labelCol.appendChild(msLRow);

      // Chart col milestone header (progress bar background)
      const msCRow = document.createElement('div');
      msCRow.className = 'tl-ms-chart';
      msCRow.style.cssText += ';border-bottom-color:'+_col+'33;background:'+_col+'08';
      // thin progress line at bottom
      const progTrack = document.createElement('div');
      progTrack.className = 'tl-ms-prog-track';
      progTrack.style.cssText = 'position:absolute;bottom:6px;left:10px;right:10px';
      const progLine = document.createElement('div');
      progLine.className = 'tl-ms-prog-fill';
      progLine.style.cssText = 'width:'+_pct+'%;background:'+_col;
      progTrack.appendChild(progLine);
      msCRow.appendChild(progTrack);
      chartCol.appendChild(msCRow);
    }

    addRow(idx,row);
    if(row.stories && row.stories.length>0 && tlExpandedRows.has(row.wbs)){
      row.stories.forEach(story=>addStoryRow(idx, row, story));
    }
  });

  // Fixed row heights — consistent across label and chart columns

  // Truncate name text based on actual column width using canvas measurement
  const _canvas = document.createElement('canvas');
  const _ctx = _canvas.getContext('2d');
  _ctx.font = '10px IBM Plex Sans Thai, sans-serif';

  function truncateName(text, availPx){
    if(_ctx.measureText(text).width <= availPx) return text;
    let lo=0, hi=text.length;
    while(lo < hi){
      const mid = (lo+hi+1)>>1;
      if(_ctx.measureText(text.slice(0,mid)+'…').width <= availPx) lo=mid;
      else hi=mid-1;
    }
    return lo > 0 ? text.slice(0,lo)+'…' : '…';
  }

  function updateNames(){
    // available = labelCol width minus fixed elements (dot ~13, wbs ~28, handle ~16, note ~14, edit ~12, padding ~16)
    const avail = Math.max(40, labelCol.offsetWidth - 100);
    labelCol.querySelectorAll('[data-nameel]').forEach(el=>{
      el.textContent = truncateName(el.dataset.fullname||'', avail);
    });
  }

  new ResizeObserver(updateNames).observe(labelCol);

  // Sync labelHdr width with labelCol when resized
  new ResizeObserver(()=>{
    const w = labelCol.offsetWidth;
    labelHdr.style.width = w+'px';
  }).observe(labelCol);

  // Sync chartHdr's width with chartCol's actual rendered width (NOT
  // chartHdrWrap — chartHdrWrap must stay sized to the visible viewport so
  // it has something to scroll; chartHdr is the wide inner content). This
  // keeps every %-based position (month/sprint cells, the TODAY line) lined
  // up pixel-for-pixel with the matching bars/gridlines in the body,
  // whether chartCol is sitting at its min-width floor (horizontal scroll
  // active) or has grown wider to fill spare viewport space, and also
  // accounts for `wrap`'s vertical scrollbar (if any) eating a few px that
  // the header's non-scrolling box never loses.
  new ResizeObserver(()=>{
    chartHdr.style.width = chartCol.clientWidth+'px';
  }).observe(chartCol);
  new ResizeObserver(()=>{
    chartHdr.style.width = chartCol.clientWidth+'px';
  }).observe(wrap);

  outerWrap.appendChild(stickyHdr);
  wrap.appendChild(labelCol);
  wrap.appendChild(chartCol);
  outerWrap.appendChild(wrap);
  cont.appendChild(outerWrap);

  // ── Scroll to today on first open ──
  // Only once per page load (see _tlInitialScrollDone above). Waits a frame
  // so chartCol has its real layout width before computing a scroll target
  // — todayPct is a % of the full date range, chartCol.clientWidth turns
  // that into a real pixel offset, then we center it in whatever's actually
  // visible (wrap's width minus the frozen label column).
  if(!_tlInitialScrollDone){
    _tlInitialScrollDone = true;
    requestAnimationFrame(()=>{
      if(todayPct===null) return;
      const viewportW = wrap.clientWidth - labelCol.offsetWidth;
      const todayX = (todayPct/100) * chartCol.clientWidth;
      const maxScroll = Math.max(0, chartCol.clientWidth - viewportW);
      wrap.scrollLeft = Math.max(0, Math.min(maxScroll, todayX - viewportW/2));
    });
  }

  // ── Milestone drag & drop — ONE delegated listener on labelCol ──
  // A separate dragover/drop pair on every single row (esp. the thin 34px
  // milestone header) was unreliable to land a drop on in real browsers.
  // Delegating to the container and using e.target.closest() to find
  // whichever row is under the pointer is more robust regardless of exactly
  // which row/element the mouse happens to be over.
  labelCol.addEventListener('dragover', e=>{
    if(!e.dataTransfer.types.includes('text/ms-wbs')) return;
    const targetRow = e.target.closest('[data-ms-wbs],[data-wbs]');
    if(!targetRow) return;
    e.preventDefault();
    document.querySelectorAll('.drop-line-above,.drop-line-below')
      .forEach(r=>r.classList.remove('drop-line-above','drop-line-below'));
    const rect = targetRow.getBoundingClientRect();
    targetRow.classList.add(e.clientY < rect.top+rect.height/2 ? 'drop-line-above' : 'drop-line-below');
  });
  labelCol.addEventListener('drop', e=>{
    if(!e.dataTransfer.types.includes('text/ms-wbs')) return;
    const targetRow = e.target.closest('[data-ms-wbs],[data-wbs]');
    if(!targetRow) return;
    e.preventDefault();
    document.querySelectorAll('.drop-line-above,.drop-line-below')
      .forEach(r=>r.classList.remove('drop-line-above','drop-line-below'));
    const srcMsId = e.dataTransfer.getData('text/ms-wbs');
    const rect = targetRow.getBoundingClientRect();
    const above = e.clientY < rect.top + rect.height/2;
    const dstMsId = targetRow.dataset.msWbs
      || (tlState.rows.find(r=>r.wbs===targetRow.dataset.wbs)||{}).msId;
    if(dstMsId) performMsReorder(srcMsId, dstMsId, above);
  });

  // ── Label column resize ──
  // Spans the FULL height of outerWrap (header row + scrollable body), not just
  // the row area below the header — otherwise the handle is only reachable in a
  // ~34px-tall header-free zone, which most people never find.
  // Positioned straddling the label/chart boundary (like a spreadsheet column
  // grip) so it's easy to grab even if the cursor isn't pixel-perfect.
  outerWrap.style.position='relative';
  const _rh = document.createElement('div');
  _rh.id='tl-resize-handle';
  _rh.style.cssText='position:absolute;top:0;bottom:0;width:10px;margin-left:-5px;cursor:col-resize;z-index:80;background:transparent;';
  _rh.style.left = TL_LABEL_W+'px';
  _rh.addEventListener('mouseenter',()=>_rh.style.background='rgba(91,141,238,.25)');
  _rh.addEventListener('mouseleave',()=>{ if(!_rhDragging) _rh.style.background='transparent'; });
  let _rhDragging=false, _rhStartX=0, _rhStartW=0;
  _rh.addEventListener('mousedown', e=>{
    e.preventDefault(); e.stopPropagation();
    _rhDragging=true; _rhStartX=e.clientX; _rhStartW=labelCol.offsetWidth;
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    const onMove=ev=>{
      const w=Math.max(140,Math.min(600,_rhStartW+(ev.clientX-_rhStartX)));
      labelCol.style.width=w+'px';
      if(labelHdr) labelHdr.style.width=w+'px';
      _rh.style.left=w+'px';
    };
    const onUp=()=>{
      _rhDragging=false;
      _rh.style.background='transparent';
      document.body.style.cursor='';
      document.body.style.userSelect='';
      // Persist so the width survives the next renderTimeline() re-render
      TL_LABEL_W = labelCol.offsetWidth;
      localStorage.setItem('zo_tl_labelw', TL_LABEL_W);
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
  outerWrap.appendChild(_rh);

  // Sync horizontal scroll of chartHdrWrap with wrap scroll
  wrap.addEventListener('scroll', ()=>{
    chartHdrWrap.scrollLeft = wrap.scrollLeft;
  });

  setTimeout(updateNames, 0);
}
/* ── Timeline Edit Modal ── */
function openTLEdit(idx){
  hideTip();
  const row = tlState.rows[idx];
  if(!row) return;

  let dlg = document.getElementById('tl-edit-dlg');
  if(!dlg){ dlg=document.createElement('dialog'); dlg.id='tl-edit-dlg'; document.body.appendChild(dlg); }
  dlg.onclick=e=>{ if(e.target===dlg) dlg.close(); };

  dlg.innerHTML=`
    <h3 style="margin:0 0 2px;font-size:13px;font-weight:600;font-family:var(--sans)">${row.wbs}</h3>
    <p style="font-size:10px;color:var(--muted,#888);margin:0 0 12px;font-family:var(--sans);line-height:1.4">${row.name}</p>
    <label>Start Date</label>
    <input type="date" id="tl-s" value="${row.start}">
    <label>Due Date</label>
    <input type="date" id="tl-e" value="${row.due}">
    <label>Status</label>
    <select id="tl-st">
      ${Object.entries(SL).map(([v,l])=>`<option value="${v}"${row.status===v?' selected':''}>${l}</option>`).join('')}
    </select>
    <label>Progress (<span id="tl-pv">${row.pct}</span>%)</label>
    <input type="range" id="tl-p" min="0" max="100" step="5" value="${row.pct}"
      oninput="document.getElementById('tl-pv').textContent=this.value"
      style="width:100%;accent-color:var(--accent,#3b6fd4);margin-top:4px;box-sizing:border-box">
    <label>Note (Timeline เท่านั้น)</label>
    <textarea id="tl-note" style="resize:vertical;min-height:52px">${row.note||''}</textarea>
    <label style="display:flex;align-items:center;gap:6px;margin-top:12px;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text,#1a1f36)">
      <input type="checkbox" id="tl-od" ${row.manualOD?'checked':''} style="width:auto;flex-shrink:0">
      🏷️ ติด tag Overdue เอง (ไม่ต้องรอวันเลยกำหนดอัตโนมัติ)
    </label>
    <div class="btns" style="justify-content:space-between">
      <button class="btn btn-ghost btn-sm" style="color:var(--red,#f0566a);border-color:rgba(240,86,106,.4)" onclick="deleteEpic(${idx})">🗑 ลบ Epic</button>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('tl-edit-dlg').close()">ยกเลิก</button>
        <button class="btn btn-primary btn-sm" onclick="saveTLEdit(${idx})">✓ บันทึก</button>
      </div>
    </div>`;
  dlg.showModal();
}

function saveTLEdit(idx){
  const dlg=document.getElementById('tl-edit-dlg'); if(!dlg) return;
  const row=tlState.rows[idx]; if(!row) return;
  const before = { start:row.start, due:row.due, status:row.status, pct:row.pct, manualOD: !!row.manualOD };
  row.start = dlg.querySelector('#tl-s').value || row.start;
  row.due   = dlg.querySelector('#tl-e').value || row.due;
  row.status= dlg.querySelector('#tl-st').value;
  row.pct   = +dlg.querySelector('#tl-p').value;

// ── Delete — Milestone / Epic / Story ──
// These never touch ClickUp or the baked-in DATA constant — they add the
// wbs/msId/story-id to a tombstone list in tlState (deletedMs/deletedWbs/
// deletedStories) that mergeState() checks on every rebuild, so a deleted
// item doesn't reappear on reload or after the background Supabase merge.
// Every delete is logged to History (with what was removed), and the
// restoreMilestone/restoreEpic/restoreStory functions below (surfaced as
// "↩ กู้คืน" buttons in the History dialog) undo it for real — see those for
// why this is more than just editing the tombstone list.
function deleteMilestone(msId){
  const ms = getDATA().find(m=>m.msId===msId);
  const msName = (ms&&ms.msName)||msId;
  const epicsHere = tlState.rows.filter(r=>r.msId===msId);
  if(!confirm(`ลบ Milestone "${msName}" ทั้งหมด?\n\nจะลบ epic ข้างใน ${epicsHere.length} รายการไปด้วย (รวม story ทั้งหมดของแต่ละ epic)\n\nจะซ่อนออกจาก Timeline นี้เท่านั้น ไม่กระทบข้อมูลจริงใน ClickUp ย้อนกลับได้จาก History log`)) return;
  if(!tlState.deletedMs) tlState.deletedMs=[];
  tlState.deletedMs.push(msId);
  tlState.rows = tlState.rows.filter(r=>r.msId!==msId);
  tlState.msOrder = (tlState.msOrder||[]).filter(id=>id!==msId);
  logHistory(`ลบ Milestone ${msId} (${msName}) ทั้งหมด — ${epicsHere.length} epic`);
  reRenderKeepScroll();
  showToast('ลบ Milestone '+msId+' แล้ว');
}

function deleteEpic(idx){
  const row = tlState.rows[idx]; if(!row) return;
  const storyCount = (row.stories||[]).length;
  if(!confirm(`ลบ Epic "${row.wbs}: ${row.name}"?\n\n${storyCount?`จะลบ story ข้างใน ${storyCount} รายการไปด้วย\n\n`:''}จะซ่อนออกจาก Timeline นี้เท่านั้น ไม่กระทบข้อมูลจริงใน ClickUp ย้อนกลับได้จาก History log`)) return;
  if(!tlState.deletedWbs) tlState.deletedWbs=[];
  tlState.deletedWbs.push(row.wbs);
  tlState.rows = tlState.rows.filter(r=>r!==row);
  document.getElementById('tl-edit-dlg')?.close();
  logHistory(`ลบ Epic ${row.wbs} (${row.name}) ทั้งหมด${storyCount?` — ${storyCount} story`:''}`);
  reRenderKeepScroll();

function deleteStory(epicIdx, storyId){
  const epicRow = tlState.rows[epicIdx]; if(!epicRow) return;
  const story = (epicRow.stories||[]).find(s=>s.id===storyId); if(!story) return;
  if(!confirm(`ลบ Story "${story.code||story.id}: ${story.name}"?\n\nจะซ่อนออกจาก Timeline นี้เท่านั้น ไม่กระทบข้อมูลจริงใน ClickUp ย้อนกลับได้จาก History log`)) return;
  if(!tlState.deletedStories) tlState.deletedStories=[];

  reRenderKeepScroll();

// ── Restore — undoes deleteMilestone/deleteEpic/deleteStory for real ──
// Deleting only ever removes things from tlState (the tombstone list +
// tlState.rows) — it never touches DATA, the baked-in ClickUp snapshot — so
// the original definition is always still there to rebuild fresh. Each
// restore: (1) drops the id from its tombstone list so future
// merges/reloads stop hiding it, (2) re-inserts a fresh row/story built from
// DATA, (3) saves immediately via tlSaveNow() rather than waiting for the
// user to remember to hit "Save Timeline" — that closes the exact race
// tlInitState() warns about above: if the background Supabase fetch is
// still in flight (or fires again later) and sees an older savedAt than
// this restore, it would silently re-apply the old tombstone and undo the
// restore a few seconds after it appeared to work.
function _lookupDeletedMsName(msId){
  const ms = getDATA().find(m=>m.msId===msId);
  return ms ? ms.msName : msId;
}
function _lookupDeletedEpicName(wbs){
  for(const ms of getDATA()) for(const ep of ms.epics) if(ep.wbs===wbs) return ep.name;
  return wbs;
}
function _lookupDeletedStoryInfo(storyId){
  for(const ms of getDATA()) for(const ep of ms.epics) for(const st of (ep.stories||[])) if(st.id===storyId) return {epicWbs:ep.wbs, name:st.name, code:st.code};
  return null;
}
function restoreMilestone(msId){
  const ms = getDATA().find(m=>m.msId===msId);
  if(!ms){ showToast('ไม่พบ '+msId+' ใน DATA — กู้คืนไม่ได้'); return; }
  tlState.deletedMs = (tlState.deletedMs||[]).filter(id=>id!==msId);
  if(!(tlState.msOrder||[]).includes(msId)) tlState.msOrder = [...(tlState.msOrder||[]), msId];
  const deletedStorySet = new Set(tlState.deletedStories||[]);
  ms.epics.forEach(ep=>{
    if((tlState.deletedWbs||[]).includes(ep.wbs)) return; // this epic was ALSO deleted on its own — leave it out
    if(tlState.rows.some(r=>r.wbs===ep.wbs)) return; // already present, don't duplicate
    tlState.rows.push({
      wbs: ep.wbs, msId: ms.msId, msColor: ms.msColor,
      name: ep.name, start: ep.start||'', due: ep.due||'',
      status: ep.status, pct: ep.pct, owner: ep.owner,
      sprints: ep.sprints||[],
      stories: (ep.stories||[]).filter(s=>!deletedStorySet.has(s.id)).map(s=>({
        id:s.id, code:s.code||'', name:s.name, status:s.status, assignee:s.assignee||'',
        url:s.url||'', start:s.start||'', due:s.due||'', note:s.note||'', manualOD:false,
      })),
      note:'',
    });
  });
  logHistory(`กู้คืน Milestone ${msId} (${ms.msName}) ทั้งหมด`);
  document.getElementById('tl-history-dlg')?.close();
  reRenderKeepScroll();
  showToast('กู้คืน Milestone '+msId+' แล้ว — กำลัง sync ขึ้น cloud...');
  tlSaveNow();
}
function restoreEpic(wbs){
  if(!(tlState.deletedWbs||[]).includes(wbs)){ showToast('ไม่พบ '+wbs+' ในรายการที่ถูกลบ'); return; }
  let restored = null;
  const deletedStorySet = new Set(tlState.deletedStories||[]);
  getDATA().forEach(ms=>{
    ms.epics.forEach(ep=>{
      if(ep.wbs!==wbs) return;
      restored = {
        wbs: ep.wbs, msId: ms.msId, msColor: ms.msColor,
        name: ep.name, start: ep.start||'', due: ep.due||'',
        status: ep.status, pct: ep.pct, owner: ep.owner,
        sprints: ep.sprints||[],
        stories: (ep.stories||[]).filter(s=>!deletedStorySet.has(s.id)).map(s=>({
          id:s.id, code:s.code||'', name:s.name, status:s.status, assignee:s.assignee||'',
          url:s.url||'', start:s.start||'', due:s.due||'', note:s.note||'', manualOD:false,
        })),
        note:'',
      };
    });
  });
  if(!restored){ showToast('ไม่พบ '+wbs+' ใน DATA — กู้คืนไม่ได้'); return; }
  tlState.deletedWbs = (tlState.deletedWbs||[]).filter(w=>w!==wbs);
  if(!tlState.rows.some(r=>r.wbs===wbs)) tlState.rows.push(restored);
  logHistory(`กู้คืน Epic ${wbs} (${restored.name})`);
  document.getElementById('tl-history-dlg')?.close();
  reRenderKeepScroll();
  showToast('กู้คืน '+wbs+' แล้ว — กำลัง sync ขึ้น cloud...');
  tlSaveNow();
}
function restoreStory(epicWbs, storyId){
  const info = _lookupDeletedStoryInfo(storyId);
  if(!info){ showToast('ไม่พบ story นี้ใน DATA — กู้คืนไม่ได้'); return; }
  const epicRow = tlState.rows.find(r=>r.wbs===(epicWbs||info.epicWbs));
  if(!epicRow){ showToast('epic ของ story นี้ยังถูกลบอยู่ — กู้คืน epic ก่อน'); return; }
  let srcStory = null;
  getDATA().forEach(ms=>ms.epics.forEach(ep=>{
    if(ep.wbs===epicRow.wbs) (ep.stories||[]).forEach(s=>{ if(s.id===storyId) srcStory=s; });
  }));
  if(!srcStory){ showToast('ไม่พบ story นี้ใน DATA — กู้คืนไม่ได้'); return; }
  tlState.deletedStories = (tlState.deletedStories||[]).filter(id=>id!==storyId);
  if(!epicRow.stories.some(s=>s.id===storyId)){
    epicRow.stories.push({
      id:srcStory.id, code:srcStory.code||'', name:srcStory.name, status:srcStory.status,
      assignee:srcStory.assignee||'', url:srcStory.url||'', start:srcStory.start||'',
      due:srcStory.due||'', note:srcStory.note||'', manualOD:false,
    });
  }
  logHistory(`กู้คืน Story ${srcStory.code||srcStory.id} (${srcStory.name}) กลับเข้า ${epicRow.wbs}`);
  document.getElementById('tl-history-dlg')?.close();
  reRenderKeepScroll();
  showToast('กู้คืน '+(srcStory.code||srcStory.id)+' แล้ว — กำลัง sync ขึ้น cloud...');
  tlSaveNow();
}
